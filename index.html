<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Meal Planner Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512x512-1.png">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  
  <!-- Firebase Compat Libraries for Hybrid Inject -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root, [data-theme="light"] {
      --color-bg: #ffffff; 
      --color-surface: #f7f6f2; 
      --color-surface-2: #f2f1ed; 
      --color-border: #e0deda; 
      --color-divider: #e0deda; 
      --color-text: #161514; 
      --color-text-muted: #6b6965; 
      --color-primary: #01696f; 
      --color-secondary: #e8af34; 
      --color-success: #38661c; 
      --color-warning: #c26502; 
      --color-error: #8f266d;
      --font-body: 'General Sans', sans-serif; 
      --font-display: 'Boska', serif;
      --shadow-md: 0 12px 32px rgba(0,0,0,0.1); 
      --ease-fluid: cubic-bezier(0.2, 0, 0, 1); 
      
      /* Diet Border Colors */
      --diet-veg-color: #38661c;
      --diet-egg-color: #e8af34;
      --diet-nonveg-color: #8f266d;
    }
    
    [data-theme="dark"] {
      --color-bg: #000000; 
      --color-surface: #121110; 
      --color-surface-2: #1a1918; 
      --color-border: rgba(255, 255, 255, 0.05); 
      --color-divider: rgba(255, 255, 255, 0.08); 
      --color-text: #e8e6e3; 
      --color-text-muted: #918f8b; 
      --color-primary: #80c7d2; 
      --color-secondary: #e6c57a; 
      --color-success: #78a85d; 
      --color-warning: #e39d5b; 
      --color-error: #e57373;
      --shadow-md: 0 16px 40px rgba(0,0,0, 1);

      /* Diet Border Colors */
      --diet-veg-color: #78a85d;
      --diet-egg-color: #e6c57a;
      --diet-nonveg-color: #e57373;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; height: 100%; overscroll-behavior-y: none; }
    body { min-height: 100%; font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); overflow-x: hidden; overscroll-behavior-y: none; user-select: none; }

    html.text-scale-110 { font-size: 110%; }
    html.text-scale-120 { font-size: 120%; }

    input, textarea { user-select: auto; color: var(--color-text); }
    button, select { font: inherit; color: inherit; outline: none; background: none; border: none; cursor: pointer; }
    
    .topbar-wrapper { position: relative; width: 100%; max-width: 70rem; margin: 0 auto; padding: calc(1.5rem + env(safe-area-inset-top)) 1rem 1rem; z-index: 40; display: flex; flex-direction: column; gap: 10px; }
    .topbar-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-logo { width: 2.75rem; height: 2.75rem; border-radius: 1rem; display: grid; place-items: center; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: #000; font-weight: bold; }
    h1 { font-family: var(--font-display); font-size: 1.75rem; font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
    
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .icon-btn, .ghost-btn, .primary-btn, .accent-btn { border-radius: 2rem; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; transition: transform 0.2s var(--ease-fluid), background 0.2s var(--ease-fluid); padding: 0.75rem 1.5rem; }
    .icon-btn { width: 44px; padding: 0; border: 1px solid var(--color-border); background: var(--color-surface); height: 44px; }
    .ghost-btn { background: var(--color-surface); border: 1px solid var(--color-border); height: 44px; }
    .primary-btn { background: var(--color-primary); color: var(--color-bg); box-shadow: 0 4px 15px color-mix(in oklab, var(--color-primary) 30%, transparent); }
    .accent-btn { background: var(--color-secondary); color: var(--color-bg); }
    button:active { transform: scale(0.92); }

    /* Quick Settings Lit/Active Status Feedback Styles */
    .util-btn { transition: 0.2s var(--ease-fluid); }
    .util-btn.active { background: var(--color-primary) !important; color: var(--color-bg) !important; border-color: var(--color-primary) !important; }

    .shell { max-width: 70rem; margin: 0 auto; padding: 1rem 1rem calc(9rem + env(safe-area-inset-bottom)); }
    .page { display: none; animation: fadePeek 0.35s var(--ease-fluid); }
    .page.active { display: block; }
    @keyframes fadePeek { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .filter-wrapper { margin-bottom: 20px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .filter-row-1 { display: flex; background: var(--color-surface); border-radius: 2rem; border: 1px solid var(--color-border); padding: 4px; }
    .source-btn { flex: 1; text-align: center; padding: 12px; border-radius: 1.5rem; cursor: pointer; font-weight: 600; color: var(--color-text-muted); transition: background 0.2s, color 0.2s; }
    .source-btn.active { background: var(--color-primary); color: var(--color-bg); }
    
    .filter-row-2 .meal-btn-full { width: 100%; padding: 16px; border-radius: 1.5rem; background: var(--color-surface); color: var(--color-text); border: 2px solid transparent; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
    .filter-row-2 .meal-btn-full.active { border-color: var(--color-primary); background: color-mix(in oklab, var(--color-primary) 10%, var(--surface)); }
    
    .filter-row-3 { display: flex; gap: 8px; }
    .cat-btn { flex: 1; padding: 14px 4px; border-radius: 1.5rem; background: var(--color-surface); color: var(--color-text); border: 2px solid transparent; font-weight: 600; cursor: pointer; font-size: 0.95rem; text-align: center; transition: 0.2s; }
    .cat-btn.active { border-color: var(--color-primary); background: color-mix(in oklab, var(--color-primary) 10%, var(--color-surface)); }

    .cards { display: grid; gap: 1.5rem; }
    .meal-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 2rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; animation: slideUpFade 0.35s var(--ease-fluid) backwards; position: relative; min-width: 0; overflow: hidden; }
    .meal-card.locked { border-color: color-mix(in oklab, var(--color-success) 50%, transparent); box-shadow: 0 0 20px color-mix(in oklab, var(--color-success) 10%, transparent); }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-header-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .eyebrow { font-size: 0.8rem; text-transform: uppercase; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.1em; }
    
    .meal-title { font-family: var(--font-display); font-size: 2.1rem; line-height: 1.1; font-weight: 600; margin: 0.25rem 0; color: var(--color-text); transition: color 0.3s ease; }
    
    .top-actions { display: flex; gap: 8px; flex-direction: row; }
    .icon-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--color-surface-2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-border); cursor: pointer; transition: transform 0.2s var(--ease-fluid), background 0.2s; color: var(--color-text); }
    .icon-circle:active { transform: scale(0.85); }
    
    .card-action { min-height: 52px; font-weight: 600; border: 2px solid var(--color-border); border-radius: 1.25rem; background: transparent; color: var(--color-text); display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0.5rem 1rem; transition: transform 0.2s var(--ease-fluid), background 0.2s, border-color 0.2s, color 0.2s; }
    .card-action:disabled { opacity: 0.3; cursor: not-allowed; }

    .card-action.border-veg { border-color: var(--diet-veg-color); color: var(--diet-veg-color); }
    .card-action.border-egg { border-color: var(--diet-egg-color); color: var(--diet-egg-color); }
    .card-action.border-nonveg { border-color: var(--diet-nonveg-color); color: var(--diet-nonveg-color); }
    .card-action.locked.border-veg { background: var(--diet-veg-color); color: #ffffff; border-color: var(--diet-veg-color); }
    .card-action.locked.border-egg { background: var(--diet-egg-color); color: #000000 !important; border-color: var(--diet-egg-color); } 
    .card-action.locked.border-nonveg { background: var(--diet-nonveg-color); color: #ffffff; border-color: var(--diet-nonveg-color); }
    
    .explore-area { display: flex; flex-direction: column; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s var(--ease-fluid), opacity 0.3s var(--ease-fluid), margin 0.3s var(--ease-fluid); margin-top: -10px; width: 100%; min-width: 0; }
    .explore-area.open { max-height: 250px; opacity: 1; margin-top: 5px; padding: 12px 0; border-top: 1px solid var(--color-divider); }
    
    .fun-fact-box { background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: 1.25rem; padding: 12px 16px; font-size: 0.9rem; line-height: 1.4; color: var(--color-text-muted); margin-bottom: 14px; text-align: left; font-style: italic; border-left: 4px solid var(--color-primary); }
    
    /* SCROLLABLE RIBBON ISOLATION - Ensures buttons don't blow out the card width */
    .explore-icons-row { display: flex; justify-content: flex-start; align-items: center; width: 100%; min-width: 0; overflow-x: auto; gap: 12px; padding-bottom: 8px; -ms-overflow-style: none; scrollbar-width: none; flex-wrap: nowrap; }
    .explore-icons-row::-webkit-scrollbar { display: none; }

    .explore-icon { width: 56px; height: 56px; border-radius: 1rem; background: var(--color-surface); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; transition: transform 0.2s var(--ease-fluid); flex-shrink: 0; color: var(--color-text); flex-direction: column; font-size: 0.65rem; font-weight: bold; gap: 4px; }
    .explore-icon svg { width: 20px; height: 20px; }
    .explore-icon:active { transform: scale(0.85); }
    
    .empty { padding: 3rem 2rem; background: var(--color-surface); border-radius: 2rem; border: 1px solid var(--color-border); color: var(--color-text-muted); text-align: center; width: 100%; }
    
    .bottom-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 400px; display: flex; gap: 12px; z-index: 1000; transition: transform 0.35s var(--ease-fluid), opacity 0.35s var(--ease-fluid); pointer-events: none; }
    .bottom-nav.nav-hidden { transform: translate(-50%, 150%); opacity: 0; }
    .bottom-nav button { margin: 0; border-radius: 100px; pointer-events: auto; box-shadow: var(--shadow-md); transition: background 0.3s, color 0.3s, border-color 0.3s; }

    .floating-share-fab { position: fixed; bottom: 100px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #1a1918; border: 1px solid var(--color-border); color: #e8e6e3; box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center; z-index: 999; transition: transform 0.3s var(--ease-fluid), opacity 0.3s; }
    [data-theme="light"] .floating-share-fab { background: #f7f6f2; color: #161514; }
    .floating-share-fab:active { transform: scale(0.88); }
    .floating-share-fab.fab-hidden { transform: scale(0); opacity: 0; pointer-events: none; }

    .cart-tools { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; width: 100%; position: relative; }
    .cart-tools input { flex: 1; min-width: 0; padding: 14px 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface); font-size: 1rem; color: var(--color-text); transition: 0.2s; height: 56px; width: 100%; }
    .cart-tools select { flex: 0 0 auto; max-width: 140px; padding: 0 12px 0 16px; height: 56px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); font-family: var(--font-body); font-size: 1.1rem; -webkit-appearance: none; appearance: none; outline: none; text-overflow: ellipsis; white-space: nowrap; }
    
    .list-item-row { display: flex; align-items: center; justify-content: space-between; background: var(--color-surface); padding: 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); margin-bottom: 12px; transition: transform 0.2s var(--ease-fluid), opacity 0.3s; width: 100%; cursor: pointer; }
    .list-item-row.dimmed { opacity: 0.45; background: transparent; }
    .list-item-left { display: flex; align-items: center; gap: 16px; flex: 1; padding-right: 12px; }
    .checkbox { width: 24px; height: 24px; border: 2px solid var(--color-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: transparent; transition: 0.2s var(--ease-fluid); flex-shrink: 0; font-weight: bold; }
    .list-item-row.checked .checkbox { background: var(--color-primary); color: var(--color-bg); border-color: var(--color-primary); }
    .item-name { font-size: 1.125rem; font-weight: 600; text-transform: capitalize; color: var(--color-text); }
    .trash-btn { background: none; border: none; font-size: 1.25rem; color: var(--color-error); padding: 8px; border-radius: 50%; cursor: pointer; transition: transform 0.2s var(--ease-fluid); }
    .trash-btn:active, .list-item-left:active { transform: scale(0.97); }
    
    #ml-content .list-item-row { transition: background 0.2s, color 0.2s, transform 0.2s; }
    #ml-content .list-item-row.checked { background: var(--color-primary); color: var(--color-bg); border-color: var(--color-primary); }
    #ml-content .list-item-row.checked .item-name { color: var(--color-bg); }
    #ml-content .list-item-row.checked .trash-btn { color: var(--color-bg); opacity: 0.9; }

    .cart-group-title { font-size: 0.85rem; font-weight: bold; color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.05em; margin: 15px 0 5px 8px; }
    .cart-group-list { display: flex; flex-direction: column; width: 100%; }
    .cart-accordion-header { display: flex; justify-content: space-between; align-items: center; background: var(--color-surface-2); padding: 16px 20px; border-radius: 1.5rem; border: 1px solid var(--color-border); cursor: pointer; user-select: none; margin-bottom: 16px; }
    .cart-group-header { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--color-primary); margin: 0; padding: 0; }
    .cart-chevron { font-size: 1.25rem; transition: transform 0.3s var(--ease-fluid); color: var(--color-text-muted); }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 2000; }
    .modal.open { display: flex; }
    .dialog { background: var(--color-surface); width: 100%; max-width: 520px; max-height: 85vh; border-radius: 2rem; border: 1px solid var(--color-border); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-md); animation: fadePeek 0.35s var(--ease-fluid); }
    .dialog-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
    
    .dialog-body { padding: 0; display: flex; flex-direction: column; overflow: hidden; }
    .master-header-box { padding: 20px 20px 0 20px; flex-shrink: 0; }
    .master-scroll-box { padding: 0 20px 20px 20px; overflow-y: auto; flex: 1; }
    
    .search-wrapper { position: relative; margin-bottom: 12px; width: 100%; display: flex; align-items: center; }
    .master-search-bar { width: 100%; padding: 14px 40px 14px 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface-2); font-size: 1rem; color: var(--color-text); margin-bottom: 0; }
    .clear-btn { position: absolute; right: 8px; width: 32px; height: 32px; border: none; background: transparent; color: var(--color-text-muted); font-size: 1.1rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    
    .filter-ribbon { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; margin-bottom: 8px; -ms-overflow-style: none; scrollbar-width: none; }
    .filter-ribbon::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 10px 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface-2); font-weight: 600; font-size: 0.9rem; color: var(--color-text); cursor: pointer; white-space: nowrap; transition: 0.2s var(--ease-fluid); }
    .filter-chip.active { background: var(--color-primary); border-color: var(--color-primary); color: var(--color-bg); }
    .filter-chip.top-picks { border-color: #ffd700; color: #ffd700; }
    .filter-chip.top-picks.active { background: #ffd700; color: #000; }
    
    .sync-indicator { position: fixed; top: 10px; right: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: bold; color: var(--color-text-muted); background: var(--color-surface-2); padding: 6px 12px; border-radius: 2rem; opacity: 0; transition: 0.3s; z-index: 9999; }
    .sync-indicator.active { opacity: 1; }
    .sync-spinner { width: 12px; height: 12px; border: 2px solid var(--text-muted); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .review-queue-list { list-style: none; display: grid; gap: 10px; margin: 0; padding: 0; }
    .review-queue-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--color-surface-2); border-radius: 1rem; justify-content: space-between; }
    .review-queue-item select { padding: 6px; border-radius: 8px; background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); font-family: var(--font-body); font-weight: bold; height: 36px; }
    
    .guided-overlay { position: fixed; inset: 0; background: var(--color-bg); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .guided-overlay.active { display: flex; }
    .guided-overlay .primary-btn:active, .guided-overlay .ghost-btn:active { transform: none !important; }
    
    .close-shopping { position: absolute; top: 40px; right: 24px; font-size: 24px; color: var(--color-text-muted); background: none; border: none; cursor: pointer; transition: transform 0.2s var(--ease-fluid); }
    .close-shopping:active { transform: scale(0.8); }
    
    .data-row { display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; padding: 1rem 1.5rem; border: 1px solid var(--color-border); border-radius: 1.25rem; background: var(--color-surface); font-size: 1rem; margin-bottom: 8px; width: 100%; transition: transform 0.2s var(--ease-fluid); }
    .data-row:active { transform: scale(0.98); }
    
    .topbar-hidden { display: none !important; }

    .diet-toggle-container { display: flex; background: var(--color-surface-2); border-radius: 2rem; border: 1px solid var(--color-border); padding: 4px; width: 100%; margin-bottom: 20px; gap: 4px; }
    .diet-btn { flex: 1; padding: 12px 4px; font-weight: 600; border-radius: 1.5rem; text-align: center; color: var(--color-text-muted); transition: 0.3s var(--ease-fluid); font-size: 0.9rem; }
    .diet-btn.active.veg { background: var(--color-success); color: var(--color-bg); }
    .diet-btn.active.egg { background: var(--color-secondary); color: #000000; } 
    .diet-btn.active.nonveg { background: var(--color-error); color: var(--color-bg); }

    .stat-btn { height: auto; padding: 16px; flex-direction: column; border-radius: 1.5rem; transition: 0.2s var(--ease-fluid); }
    .stat-num { font-size: 1.5rem; margin-bottom: 4px; font-weight: bold; }
    .stat-title { font-size: 0.8rem; color: var(--color-text-muted); transition: 0.2s; }
    .stat-btn.active { background: var(--color-primary); border-color: var(--color-primary); transform: scale(1.02); }
    .stat-btn.active .stat-num, .stat-btn.active .stat-title { color: var(--color-bg); }
    
    .toast-container { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; margin-top: 20px; width: 90%; max-width: 400px;}
    .toast { background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); padding: 16px 20px; border-radius: 1.5rem; box-shadow: var(--shadow-md); font-weight: 600; font-size: 0.95rem; text-align: center; animation: toastSlide 0.3s var(--ease-fluid forwards); transition: opacity 0.3s; pointer-events: auto; }
    @keyframes toastSlide { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Dynamic Grid Layout for Shopping Partners */
    .partner-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 30px;
        margin-bottom: 24px;
        position: relative;
        z-index: 10;
    }
    .partner-grid button:last-child:nth-child(odd) {
        grid-column: span 2;
    }
  </style>
</head>
<body>
  
  <div class="sync-indicator" id="syncIndicator"><div class="sync-spinner"></div> System Sync...</div>

  <div class="topbar-wrapper" id="mainTopbar">
    <div class="topbar-main">
      <div class="brand"><img class="brand-logo" src="icon-512x512.png" alt="Logo" style="object-fit: cover; padding: 0; border: none; background: transparent;" /><h1>Meal Planner</h1></div>
      <div class="header-actions" id="topbar-plan-actions">
        <button class="ghost-btn" id="openDataBtn" onclick="openCookbook()">
            <svg style="pointer-events:none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </button>

  <script>
    const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzNOXoxn17I3d4-inuxiEqhdPxOQokGlSGCYW8buwLTcO6YJxbvcHBH0dZ1d-fBDzwl/exec"; 
    
    // FIREBASE INITIALIZATION FOR CART SYNC
    const firebaseConfig = {
      apiKey: "AIzaSyDxvkFhrJBbij-XkJpQhg6vhzCgH7oaiwU",
      authDomain: "mealplanner-e4954.firebaseapp.com",
      databaseURL: "https://mealplanner-e4954-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mealplanner-e4954",
      storageBucket: "mealplanner-e4954.firebasestorage.app",
      messagingSenderId: "366670326612",
      appId: "1:366670326612:web:6c0f281616d05812f6b6c1"
    };
    firebase.initializeApp(firebaseConfig);
    window.firebaseDb = firebase.database();

    let state = { grocery: [], savedMeals: [], globalMeals: [], currentSuggestions: [] };
    let appSettings = { diets: ['veg'], showInfo: false, partners: ['Swiggy', 'Blinkit'] }; 
    
    let pendingApprovals = []; let graveyard = []; let deckCache = {}; 
    let activeTab = 'plan'; let activeMasterCategory = 'All'; let isCartExpanded = false;
    let activeSource = 'cookbook'; let activeCategory = null;
    let currentRenderedCacheKey = '';
    let showBoughtCount = false;
    let showCategoryInfo = true;
    let showEditActions = false;
    let isShoppingActive = false;
    let standaloneMealContext = null; 
    let pendingDuplicateMeal = null;
    let pendingDuplicateCategory = null;

    const SYNONYM_DICTIONARY = {
        "dahi": "curd",
        "yogurt": "curd",
        "dhaniya": "coriander leaves",
        "coriander": "coriander leaves",
        "alu": "potato",
        "aloo": "potato",
        "pyaz": "onion",
        "pyaaz": "onion",
        "sabzi": "vegetables",
        "bhindi": "lady finger",
        "okra": "lady finger"
    };

    function resolveSynonym(term) {
        const lower = term.toLowerCase().trim();
        if (SYNONYM_DICTIONARY[lower]) {
            return SYNONYM_DICTIONARY[lower];
        }
        return term;
    }

    function onManualCartInput() {
        const input = document.getElementById('manualCartAdd');
        const dropdown = document.getElementById('manualCartAutocomplete');
        let term = input.value.trim();
        
        if (!term) {
            dropdown.style.display = 'none';
            dropdown.innerHTML = '';
            return;
        }

        const resolvedTerm = resolveSynonym(term);

        let matches = state.grocery.filter(item => {
            if (item.category === 'Ghost') return false;
            return fuzzyMatch(resolvedTerm, item.name) || (resolvedTerm !== term && fuzzyMatch(term, item.name));
        });

        matches.sort((a, b) => (b.count - a.count) || a.name.localeCompare(b.name));
        matches = matches.slice(0, 5);

        if (matches.length === 0) {
            dropdown.style.display = 'none';
            dropdown.innerHTML = '';
            return;
        }

        dropdown.innerHTML = matches.map(item => {
            const safeName = escapeHtml(item.name);
            const jsSafeName = escapeJsArg(item.name);
            return `<div style="padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--color-border); font-weight: 600;" 
                         onclick="selectAutocompleteItem('${jsSafeName}')"
                         onmousedown="event.preventDefault();">
                        ${safeName}
                    </div>`;
        }).join('');
        
        dropdown.style.display = 'block';
    }

    function selectAutocompleteItem(name) {
        const rawName = unescapeHtml(name);
        let item = state.grocery.find(i => i.name.toLowerCase() === rawName.toLowerCase());
        if (item) {
            item.inCart = true;
            item.checked = true;
            if (!item.checkTime) {
                item.checkTime = Date.now();
            }
            item.mealContext = '';
            delete item.fuzzyOriginal;
            delete item.swappedFromPantry;
            expandCartIfNeeded();
            if (!isShoppingActive) renderCart();
            queueLocalSave();
            queueCartSync();
            showToast(`Added ${item.name} to cart.`);
        }
        const input = document.getElementById('manualCartAdd');
        input.value = '';
        const dropdown = document.getElementById('manualCartAutocomplete');
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
    }

    function expandCartIfNeeded() {
        if (!isCartExpanded) {
            isCartExpanded = true;

    let pendingSaves = 0;

    function queueLocalSave() {
        if (window.localSaveTimer) clearTimeout(window.localSaveTimer);
        window.localSaveTimer = setTimeout(() => { saveStateLocally(); }, 500);
    }

    function queueCartSync() {
        pendingSaves++;
        if (mutationTimer) clearTimeout(mutationTimer);
        mutationTimer = setTimeout(() => { flushCartSync(); }, MUTATION_DELAY);
    }

    function flushCartSync() {
        if (pendingSaves === 0) return;
        if (mutationTimer) { clearTimeout(mutationTimer); mutationTimer = null; }
        
        let savesProcessing = pendingSaves; 
        let payload = state.grocery.filter(i => i.inCart);
        
        // Sanitize payload to strip 'undefined' values before Firebase push
        payload = JSON.parse(JSON.stringify(payload));
        
        // Push exclusively to Firebase Realtime DB (Live Cart Sync)
        window.firebaseDb.ref('cart').set(payload).then(() => {
            pendingSaves = Math.max(0, pendingSaves - savesProcessing);
            if (pendingSaves > 0) queueCartSync(); 
        }).catch(e => {
            pendingSaves = Math.max(0, pendingSaves - savesProcessing);
            showToast("Sync lag. Using offline cache.");
            if (pendingSaves > 0) queueCartSync();
        });
    }

    // FIREBASE REAL-TIME CART LISTENER
    let isFirstFirebaseLoad = true;
    window.firebaseDb.ref('cart').on('value', snap => {
        // Safe-guard to prevent remote data from destructively resurrecting active cart states mid-sync
        if (pendingSaves > 0 || isShoppingActive) return; 

        const remoteCart = snap.val() || [];
        
        // Remove cart status from existing state
        state.grocery.forEach(i => { i.inCart = false; });
        
        // Re-apply cart states or add new Ghost items
        remoteCart.forEach(remoteItem => {
            let localItem = state.grocery.find(i => i.name.toLowerCase() === remoteItem.name.toLowerCase());
            if (localItem) {
                localItem.inCart = true;
                localItem.checked = remoteItem.checked;
                localItem.mealContext = remoteItem.mealContext;
                localItem.checkTime = remoteItem.checkTime;
                localItem.fuzzyOriginal = remoteItem.fuzzyOriginal;
                localItem.swappedFromPantry = remoteItem.swappedFromPantry;
            } else {
                state.grocery.push(remoteItem);
            }
        });
        
        // Prune Ghost items that are no longer active in cart
        state.grocery = state.grocery.filter(i => !(i.category === 'Ghost' && !i.inCart));
        
        saveStateLocally();
        if (activeTab === 'cart' && !isShoppingActive) renderCart();
        
        if (isFirstFirebaseLoad) isFirstFirebaseLoad = false;
    });

    function applyCloudData(parsed) {
        if (!(parsed && parsed.success && parsed.data)) return false;

        const newGrocery = parsed.data.grocery || [];
        const newSaved = parsed.data.savedMeals || [];
        const newGlobal = parsed.data.globalMeals || [];

        // Completely strip Google Sheets from dictating active cart flags
        newGrocery.forEach(cloudItem => {
            const localItem = state.grocery.find(i => i.name.toLowerCase() === cloudItem.name.toLowerCase());
            if (localItem) {
                cloudItem.inCart = localItem.inCart || false;
                cloudItem.checked = localItem.checked || false;
                cloudItem.mealContext = localItem.mealContext || '';
                cloudItem.checkTime = localItem.checkTime;
                cloudItem.fuzzyOriginal = localItem.fuzzyOriginal;
                cloudItem.swappedFromPantry = localItem.swappedFromPantry;
                cloudItem.count = localItem.count || 0; 
            } else {
                cloudItem.inCart = false;
                cloudItem.checked = false;
                cloudItem.mealContext = '';
                delete cloudItem.checkTime;
            }
        });

        // Never drop "Ghost" items (ad-hoc items added mid-shop that aren't in the master list yet)
        const localGhosts = state.grocery.filter(i => i.category === 'Ghost');
        localGhosts.forEach(g => {
            if (!newGrocery.find(i => i.name.toLowerCase() === g.name.toLowerCase())) {
                newGrocery.push(g);
            }
        });

        state.grocery = newGrocery;
        state.savedMeals = newSaved;
        state.globalMeals = newGlobal;
        saveStateLocally();

        populateCategoryDropdowns();
        if (activeTab === 'cart' && !isShoppingActive) renderCart();
        const activeBtn = document.querySelector('.stat-btn.active');
        if (activeBtn) renderCookbookList(activeBtn.dataset.cbcat, true);
        updateCookbookStats();
        return true;
    }

    function levenshtein(a, b) {
        if(a.length === 0) return b.length;
        if(b.length === 0) return a.length;
        let matrix = [];
        for(let i = 0; i <= b.length; i++) matrix[i] = [i];
        for(let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for(let i = 1; i <= b.length; i++) {
            for(let j = 1; j <= a.length; j++) {
                if(b.charAt(i-1) === a.charAt(j-1)) {
                    matrix[i][j] = matrix[i-1][j-1];
                } else {
                    matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                }
            }
        }
        return matrix[b.length][a.length];
    }

    function fuzzyMatch(query, target) {
        let q = query.toLowerCase().replace(/omelette/g, 'omelet');
        let t = target.toLowerCase().replace(/omelette/g, 'omelet');
        if (t.includes(q)) return true;
        
        const terms = q.split(' ').filter(Boolean);
        return terms.every(term => {
            if (t.includes(term)) return true;
            const targetWords = t.split(' ');
            for (let word of targetWords) {
                if (word.length >= 4 && levenshtein(term, word) <= 1) return true;
                if (word.length > 5 && levenshtein(term, word) <= 2) return true;
            }
            return false;
        });
    }

    function executeSoftDelete(context, nameStr) {
        if(navigator.vibrate) navigator.vibrate(15);
        const idx = state.grocery.findIndex(i => i.name.toLowerCase() === nameStr.toLowerCase());
        
        if(idx > -1) {
            const item = state.grocery[idx];
            graveyard.push({ context: 'cart', item: JSON.parse(JSON.stringify(item)), originalIndex: idx }); 
            
            if(context === 'cart') {
                item.inCart = false; 
                item.checked = false; 
                item.mealContext = '';
                delete item.checkTime;
                delete item.fuzzyOriginal;
                delete item.swappedFromPantry;
                if(item.category === 'Ghost') state.grocery.splice(idx, 1);
                if (!isShoppingActive) renderCart(); 
                queueLocalSave(); 
                queueCartSync();
            } else if (context === 'master') {
                state.grocery.splice(idx, 1);
                filterMasterList(); 
                queueLocalSave(); 
                runServer('deleteMasterItem', {item: item.name});
            }
            updateUndoButton();
        }
    }

    function undoDelete() {
        if (!graveyard.length) return;
        const last = graveyard.pop();
        
        if(last.context === 'cart') {
            let existing = state.grocery.find(i => i.name.toLowerCase() === last.item.name.toLowerCase());
            if(existing) { 
                existing.inCart = true; 
                existing.checked = last.item.checked; 
                existing.mealContext = last.item.mealContext; 
                existing.checkTime = last.item.checkTime;
            } else { 
                state.grocery.push(last.item); 
            }
            expandCartIfNeeded();
            if (!isShoppingActive) renderCart(); 
            queueLocalSave(); 
            queueCartSync();
        } else if (last.context === 'master') {
            state.grocery.splice(last.originalIndex, 0, last.item);
            filterMasterList(); 
            queueLocalSave(); 
            runServer('addMasterItem', {item: last.item.name, category: last.item.category});
        }
        updateUndoButton();
    }

        };

    function renderEmptyState() {
        document.getElementById('suggestions').innerHTML = `
            <div class="empty" style="padding: 5rem 1rem; border:none; background:transparent;">
                <h3 style="font-size: 2.5rem; margin-bottom: 1rem; line-height:1.2;">✨<br>Awaken Your Palate</h3>
                <p class="subtle" style="font-size: 1.1rem; line-height: 1.5; color: var(--color-text-muted);">Select a culinary path to begin</p>
            </div>`;
    }

    function renderOutputDeck(schema) {
      state.currentSuggestions = structuredClone(schema);
      const s = document.getElementById('suggestions'); 
      s.innerHTML = '';
      if (!schema.length) { 
          s.innerHTML = `<div class="empty"><h3>Empty Pool</h3><p class="subtle">No meals found for this selection.</p></div>`; 
          return; 
      }
      schema.forEach((item, index) => {
        const article = document.createElement('article');
        article.className = 'meal-card' + (item.isLocked ? 'locked' : '');
        article.id = `card-${index}`;
        article.innerHTML = getCardInnerHTML(item, index, false);
        s.appendChild(article);
      });
    }

    // Master Event Listener for all Card Actions (Deck & Standalone Modal Nodes)
    document.addEventListener('click', async event => {
      const btn = event.target.closest('[data-action]'); 
      if (!btn) return;
      
      const idxRaw = btn.dataset.index;
      const isStandalone = btn.dataset.standalone === "true";
      const action = btn.dataset.action; 
      
      let card = isStandalone ? standaloneMealContext : state.currentSuggestions[idxRaw];
      if (!card) return;
      
      if (action === 'prev-meal' || action === 'next-meal') {
          if (isStandalone) return; 
          const pool = activeSource === 'cookbook' ? (state.savedMeals || []) : (state.globalMeals || []);
          let valid = [];
          if (activeCategory === 'Meals') {
              valid = pool.filter(m => appSettings.diets.includes((m.diet || 'veg').toLowerCase()) && !['dessert', 'drinks', 'cocktails'].includes((m.category || '').toLowerCase()) && (m.category || '').toLowerCase() === card.time.toLowerCase());
          } else {
              valid = pool.filter(m => (m.category || '').toLowerCase() === activeCategory.toLowerCase() && (appSettings.diets.includes((m.diet || 'veg').toLowerCase())));
          }

          if (valid.length > 1) {
              let currentIdx = valid.findIndex(m => m.name === card.name);
              if (currentIdx === -1) currentIdx = 0;
              let newIdx = action === 'next-meal' ? (currentIdx + 1) % valid.length : (currentIdx - 1 + valid.length) % valid.length;
              let newMeal = valid[newIdx];
              
              state.currentSuggestions[idxRaw] = buildCard(card.time, newMeal, activeSource);
              const article = document.getElementById(`card-${idxRaw}`);
              article.className = 'meal-card';
              article.innerHTML = getCardInnerHTML(state.currentSuggestions[idxRaw], idxRaw, false);
              
              const cacheKey = `${activeSource}_${activeCategory}`;
              if (deckCache[cacheKey]) deckCache[cacheKey] = [...state.currentSuggestions];
          } else {
              showToast("No other meals in this category.");
          }
      }
      
      if (action === 'toggle-explore') {
          const targetContainerId = isStandalone ? `explore-standalone` : `explore-${idxRaw}`;
          const containerNode = document.getElementById(targetContainerId);
          if (containerNode) containerNode.classList.toggle('open');
      }
      
      if (action === 'queue-meal') {
          const bookmarkSvg = document.getElementById(`bookmark-${idxRaw}`);
          if (card.isQueued || pendingApprovals.some(p => p.meal.toLowerCase() === card.name.toLowerCase())) {
              card.isQueued = false; 
              pendingApprovals = pendingApprovals.filter(p => p.meal.toLowerCase() !== card.name.toLowerCase());
              if (bookmarkSvg) {
                  bookmarkSvg.setAttribute('fill', 'none'); 
                  bookmarkSvg.setAttribute('stroke', 'currentColor');
              }
          } else {
              card.isQueued = true; 
              pendingApprovals.push({ 
                  category: card.category || card.time, 
                  meal: card.name, 
                  diet: card.diet, 
                  ingredients: card.ingredients,
                  cuisine: card.cuisine || '',
                  origin: card.origin || '',
                  fact: card.fact || ''
              });
              if (bookmarkSvg) {
                  bookmarkSvg.setAttribute('fill', 'var(--color-success)'); 
                  bookmarkSvg.setAttribute('stroke', 'var(--color-success)');
              }
          }
          renderReviewQueue(); 
          updateCookbookIconState();
          queueLocalSave();
      }

      if (action === 'lock') { 
          card.isLocked = !card.isLocked;
          if (card.isLocked) { 
              card.lastServed = new Date().toISOString(); 
              runServer('logCooking', {mealName: card.name, sourceSheet: card.source}); 
          } else { 
              card.lastServed = ''; 
              runServer('removeCookingLog', {mealName: card.name, sourceSheet: card.source}); 
          }

          const targetPool = card.source === 'cookbook' ? state.savedMeals : state.globalMeals;
          const poolMeal = targetPool.find(m => m.name === card.name);
          if (poolMeal) poolMeal.lastServed = card.lastServed;

          if (isStandalone) {
              const article = document.getElementById('standalone-card');
              article.className = 'meal-card' + (card.isLocked ? ' locked' : ''); 
              article.innerHTML = getCardInnerHTML(card, 'standalone', true);
          } else {
              const article = document.getElementById('suggestions').children[idxRaw];
              article.className = 'meal-card' + (card.isLocked ? ' locked' : ''); 
              article.innerHTML = getCardInnerHTML(card, idxRaw, false);
              const cacheKey = `${activeSource}_${activeCategory}`;
              if (deckCache[cacheKey]) deckCache[cacheKey] = [...state.currentSuggestions];
          }
          
          queueLocalSave();
      }
      
      if (action === 'add-to-cart') {
          if (card.ingredients && card.ingredients !== '[]') {
              try { 
                  pushToCartLocally(JSON.parse(card.ingredients), card.name); 
                  expandCartIfNeeded();
                  showToast('Added to Cart!'); 
              } catch(e) {}
          }
      }
      
      const searchQ = encodeURIComponent(card.name.trim() + ' ' + (card.time || '').trim() + ' recipe');
      if (action === 'share-card') { 
          window.open(`whatsapp://send?text=${encodeURIComponent(`🍽️ *${card.name.trim()}*\n\n🔍 _https://www.google.com/search?q=${searchQ}_\n\n▶️ _https://www.youtube.com/results?search_query=${searchQ}_`)}`, '_blank'); 
      }
      if (action === 'google') { window.open(`https://www.google.com/search?q=${searchQ}`, '_blank'); }
      if (action === 'youtube') { window.open(`https://www.youtube.com/results?search_query=${searchQ}`, '_blank'); }
      if (action === 'nutrition') { window.open(`https://www.google.com/search?q=${searchQ}+nutritional+info+calories+in+table+format`, '_blank'); }
    });

    function shareDailyMenuToWhatsApp() {
        if (!state.currentSuggestions || !Array.isArray(state.currentSuggestions)) { showToast("Please generate a menu first."); return; }
        const lockedCards = state.currentSuggestions.filter(card => card.isLocked);
        if (lockedCards.length === 0) { showToast("Please Select a meal to share"); return; }
        let text = "🍽️ *Today's Menu*\n\n";
        lockedCards.forEach(card => { 
            const searchQ = card.name.trim() + ' ' + (card.time || '').trim() + ' recipe';
            text += `*${card.category}:* ${card.name.trim()}\n\n🔍 _https://www.google.com/search?q=${encodeURIComponent(searchQ)}_\n\n▶️ _https://www.youtube.com/results?search_query=${encodeURIComponent(searchQ)}_\n\n`; 
        });
        window.open(`whatsapp://send?text=${encodeURIComponent(text.trim())}`, '_blank');
    }

    // ------------------------------------------------
    // SAVE BUTTON & DUPLICATE PREVENTION
    // ------------------------------------------------
    function promoteGhostItem(itemName) {
        document.getElementById('ghostPromoteName').value = unescapeHtml(itemName);
        const sortedCats = getSortedCategories();
        document.getElementById('ghostPromoteCategory').innerHTML = `<option value="📦 Uncategorized">📦 Category</option>` + 
            sortedCats.filter(c => !['All', '🔥 Top Picks', '📦 Uncategorized'].includes(c.id))
                      .map(c => `<option value="${c.id}">${c.label}</option>`).join('');
        openModal('ghostPromoteModal');
    }

    function confirmGhostPromotion() {
        const name = document.getElementById('ghostPromoteName').value.trim();
        const category = document.getElementById('ghostPromoteCategory').value;
        if(!name) return;
        
        const nameLower = name.toLowerCase();
        const existing = state.grocery.find(i => i.name.toLowerCase() === nameLower && i.category !== 'Ghost');
        
        if(existing) {
            existing.inCart = true; 
            existing.checked = true;
            if (!existing.checkTime) {
                existing.checkTime = Date.now();
            }
            existing.mealContext = '';
            state.grocery = state.grocery.filter(i => !(i.name.toLowerCase() === nameLower && i.category === 'Ghost'));
            showToast(`${name} already in database. Added to cart.`);
        } else {
            let ghost = state.grocery.find(i => i.name.toLowerCase() === nameLower && i.category === 'Ghost');
            if (ghost) {
                ghost.category = (category && category !== '📦 Uncategorized') ? category : '📦 Uncategorized';
                ghost.mealContext = '';
            }
            runServer('addMasterItem', {item: name, category: category});
            showToast(`${name} permanently saved.`);
        }
        
        if (!isShoppingActive) renderCart(); 
        queueLocalSave(); 
        queueCartSync();
        closeModal('ghostPromoteModal');
    }

    // COOKBOOK MEAL DELETION
    // ------------------------------------------------
    let mealToDeleteName = '';
    let mealToDeleteSource = '';

    function confirmMealDeletionPrompt(name, src) {
        mealToDeleteName = unescapeHtml(name);
        mealToDeleteSource = src;
        document.getElementById('deleteMealTargetName').innerText = mealToDeleteName;
        openModal('mealDeleteModal');
    }
    
    function confirmMealDeletion() {
        const targetLower = mealToDeleteName.toLowerCase();
        if(mealToDeleteSource === 'Local DB') {
            state.savedMeals = state.savedMeals.filter(m => m.name.toLowerCase() !== targetLower);
        } else {

    // ------------------------------------------------
    // CART ENGINE: SEMANTIC MATCHER & STABLE IN-PLACE SWAP
    // ------------------------------------------------
    function pushToCartLocally(ingredientsList, mealContext) {
        const depluralize = (str) => str.endsWith('s') ? (str.endsWith('es') ? str.slice(0, -2) : str.slice(0, -1)) : str;
        const cleanStr = (s) => s.toLowerCase().trim().replace(/[^a-z0-9\s]/gi, '').replace(/\s+/g, ' ');
        
        let baseTime = Date.now();
        
        ingredientsList.reverse().forEach(ing => {
            baseTime++;
            const rawIng = cleanStr(ing);
            const deplurIng = depluralize(rawIng);
            
            // Intelligent Matching Engine
            let existing = state.grocery.find(i => {
                if (i.category === 'Ghost' && i.mealContext !== mealContext) return false;
                
                const dbName = cleanStr(i.name);
                const deplurDb = depluralize(dbName);
                
                if (dbName === rawIng || deplurDb === deplurIng || dbName === deplurIng || deplurDb === rawIng) return true;
                if (dbName.includes(rawIng) || dbName.includes(deplurIng)) return true;
                if (dbName.length > 3 && (rawIng.includes(dbName) || deplurIng.includes(deplurDb))) return true;
                
                return false;
            });

            if (existing) {
                existing.inCart = true; 
                existing.checked = true; 
                if (!existing.checkTime) {
                    existing.checkTime = baseTime;
                }
                existing.mealContext = mealContext;
                
                const dbName = cleanStr(existing.name);
                const deplurDb = depluralize(dbName);
                const isExactMatch = (dbName === rawIng || deplurDb === deplurIng || dbName === deplurIng || deplurDb === rawIng);
                
                if (!isExactMatch) {
                    existing.fuzzyOriginal = ing; 
                } else {
                    delete existing.fuzzyOriginal;
                }
            } else {
                state.grocery.unshift({ name: ing, count: 0, lastOrdered: '', category: 'Ghost', inCart: true, checked: true, checkTime: baseTime, mealContext: mealContext });
            }
        });
        
        expandCartIfNeeded();
        if (!isShoppingActive) renderCart(); 
        queueLocalSave(); 
        queueCartSync();
    }
    
    function executeSwap(itemName) {
        const rawName = unescapeHtml(itemName);
        const idx = state.grocery.findIndex(i => i.name === rawName);
        if (idx === -1) return;
        const item = state.grocery[idx];

        if (item.fuzzyOriginal) {
            item.inCart = false;
            let gIdx = state.grocery.findIndex(i => i.name === item.fuzzyOriginal && i.category === 'Ghost');
            if (gIdx > -1) {
                state.grocery[gIdx].inCart = true;
                state.grocery[gIdx].checked = true;
                state.grocery[gIdx].swappedFromPantry = item.name;
                state.grocery[gIdx].checkTime = item.checkTime || Date.now();
            } else {
                state.grocery.push({ 
                    name: item.fuzzyOriginal, count: 0, lastOrdered: '', category: 'Ghost', 
                    inCart: true, checked: true, checkTime: item.checkTime || Date.now(), mealContext: item.mealContext, swappedFromPantry: item.name 
                });
            }
        } else if (item.swappedFromPantry) {
            item.inCart = false;
            let pIdx = state.grocery.findIndex(i => i.name === item.swappedFromPantry);
            if (pIdx > -1) {
                state.grocery[pIdx].inCart = true;
                state.grocery[pIdx].checked = true;
                state.grocery[pIdx].checkTime = item.checkTime || Date.now();
            }
        }
        
        if (!isShoppingActive) renderCart(); 
        queueLocalSave(); 
        queueCartSync();
    }

    function shareCartToWhatsApp() {
        const checkedItems = state.grocery.filter(i => i.inCart && i.checked);
        if (!checkedItems.length) return;
        let text = "🛒 *Grocery List:*\n\n";
        checkedItems.forEach(i => text += `- ${i.name}\n`);
        window.open(`whatsapp://send?text=${encodeURIComponent(text.trim())}`, '_blank');
    }

    function removeMealGroup(mealContext) {
        const rawContext = unescapeHtml(mealContext);
        let hasChanges = false;
        state.grocery.forEach(i => {
            if (i.inCart && i.mealContext === rawContext) {
                i.inCart = false; i.checked = false; i.mealContext = ''; delete i.checkTime;
                delete i.fuzzyOriginal;
                delete i.swappedFromPantry;
                hasChanges = true;
            }
        });
        state.grocery = state.grocery.filter(i => !(i.category === 'Ghost' && !i.inCart));
        if (hasChanges) {
            if (!isShoppingActive) renderCart();
            queueLocalSave();
            queueCartSync();
        }
    }

    function renderCart() {
      const container = document.getElementById('unified-cart-items');
      const activeCart = state.grocery.filter(item => item.inCart);
      activeCart.sort((a, b) => (a.checkTime || 0) - (b.checkTime || 0));
      const checkedCartItems = activeCart.filter(item => item.checked);
      
      const navBtn = document.getElementById('navToggleBtn');
      if (navBtn) {
          if (checkedCartItems.length > 0) {
              navBtn.style.background = 'color-mix(in oklab, var(--color-surface) 90%, transparent)';
              navBtn.style.color = 'var(--color-primary)';
              navBtn.style.border = '2px solid var(--color-primary)';
          } else {
              navBtn.style.background = 'color-mix(in oklab, var(--color-surface) 90%, transparent)';
              navBtn.style.color = 'var(--color-text)';
              navBtn.style.border = '1px solid var(--color-border)';
          }
      }

      if (activeCart.length === 0) { 
          container.innerHTML = ''; 
          return; 
      }

      const groups = {};
      activeCart.forEach(item => {
        let groupName = item.mealContext ? `For ${item.mealContext}` : 'Groceries';
        if (!groups[groupName]) groups[groupName] = [];
        groups[groupName].push(item);
      });

      let html = '';
      for (let group in groups) {
          if (group !== 'Groceries') {
              const mealContext = group.replace('For ', '');
              html += `<div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0 5px 8px;">
                          <div class="cart-group-title" style="margin:0;">${escapeHtml(group)}</div>
                          <button class="ghost-btn" style="color:var(--color-error); border:none; height:32px; width:32px; padding:0; font-weight:bold; font-size:1.5rem; display:flex; justify-content:center; align-items:center;" onclick="removeMealGroup('${escapeJsArg(mealContext)}')">-</button>
                       </div>`;
          } else {
              html += `<div class="cart-group-title">${escapeHtml(group)}</div>`;
          }
          
          html += `<div class="cart-group-list">`;
          
          groups[group].forEach(item => {
              const isGhost = item.category === 'Ghost';
              const safeName = escapeHtml(item.name);
              const jsSafeName = escapeJsArg(item.name);
              const hasSwap = !!(item.fuzzyOriginal || item.swappedFromPantry);
              
              let swapHtml = `<div style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">${hasSwap ? `<button class="ghost-btn" style="border:none; padding:0; width: 100%; height: 100%; font-size: 1.25rem; display: flex; align-items: center; justify-content: center;" onclick="executeSwap('${jsSafeName}')">🔀</button>` : ''}</div>`;
              let saveHtml = `<div style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">${isGhost ? `<button class="ghost-btn" style="border:none; padding:0; width: 100%; height: 100%; font-size: 1.25rem; display: flex; align-items: center; justify-content: center;" onclick="promoteGhostItem('${jsSafeName}')">💾</button>` : ''}</div>`;

              html += `
              <div class="list-item-row ${item.checked ? 'checked' : 'dimmed'}" id="cart-row-${btoa(encodeURIComponent(item.name)).replace(/[^a-zA-Z0-9]/g, '')}" onclick="toggleCartItem('${jsSafeName}')">
                <div class="list-item-left" style="pointer-events: none; flex: 1; min-width: 0;">
                    <div class="checkbox">${item.checked ? '✓' : ''}</div>
                    <div style="min-width: 0; word-break: break-word;"><div class="item-name">${safeName}</div></div>
                </div>
                <div style="display:flex; align-items:center; justify-content:flex-end; gap: 4px; flex-shrink: 0;" onclick="event.stopPropagation();">
                    ${swapHtml}
                    ${saveHtml}
                    <div style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <button class="trash-btn" style="padding:0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;" onclick="executeSoftDelete('cart', '${jsSafeName}')">
                            <svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
              </div>`;
          });
          html += `</div>`;
      }
      container.innerHTML = html;
    }

    function toggleCartItem(name) { 
        const rawName = unescapeHtml(name);
        const item = state.grocery.find(i => i.name.toLowerCase() === rawName.toLowerCase());
        
        if(item) {
            item.checked = !item.checked;
            if (!item.checkTime) {
                item.checkTime = Date.now(); 
            }
            if (!isShoppingActive) renderCart();
            queueLocalSave(); 
            queueCartSync();
        }
    }

    function getSortedCategories() {
        const catFreqs = {};
        state.grocery.forEach(item => { catFreqs[item.category] = (catFreqs[item.category] || 0) + (item.count || 1); });
        const fixedTop = ['All', '🔥 Top Picks']; const fixedBottom = ['📦 Uncategorized'];
        const dynamicCats = MASTER_CATEGORIES.filter(c => !fixedTop.includes(c.id) && !fixedBottom.includes(c.id));
        dynamicCats.sort((a, b) => (catFreqs[b.id] || 0) - (catFreqs[a.id] || 0));
        return [...MASTER_CATEGORIES.filter(c => fixedTop.includes(c.id)), ...dynamicCats, ...MASTER_CATEGORIES.filter(c => fixedBottom.includes(c.id))];
    }

    function renderCookbookList(cat, isSearchUpdate = false) {
        document.getElementById('cookbookOutput').innerHTML = ''; 

        const activeBtn = document.querySelector(`.stat-btn[data-cbcat="${cat}"]`);
        if (!isSearchUpdate) {
            if (activeBtn && activeBtn.classList.contains('active')) { 
                activeBtn.classList.remove('active'); 
                document.getElementById('cookbookSearchInput').value = ''; 
                return; 
            }
            document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            if(activeBtn) activeBtn.classList.add('active');
            document.getElementById('cookbookSearchInput').value = ''; 
        }

        const term = document.getElementById('cookbookSearchInput').value.trim();
        let items = [];
        const sm = state.savedMeals || [];
        const gm = state.globalMeals || [];

        if (cat === 'MyMeals') items = sm.filter(m => appSettings.diets.includes((m.diet || 'veg').toLowerCase()) && ['breakfast','lunch','dinner'].includes((m.category || '').toLowerCase())).map(m=>({...m, src:'Local DB'}));
        else if (cat === 'Global') items = gm.filter(m => appSettings.diets.includes((m.diet || 'veg').toLowerCase()) && ['breakfast','lunch','dinner'].includes((m.category || '').toLowerCase())).map(m=>({...m, src:'AI Pool'}));
        else items = [...sm.filter(m=>(m.category || '').toLowerCase()===cat.toLowerCase()).map(m=>({...m, src:'Local DB'})), ...gm.filter(m=>(m.category || '').toLowerCase()===cat.toLowerCase()).map(m=>({...m, src:'AI Pool'}))];

        if (term) items = items.filter(i => fuzzyMatch(term, i.name));
        
        // --- SURGICAL DEDUPLICATION FIX ---
        // Prevents items that exist in both Local DB and AI Pool from rendering twice 
        // when category buttons (like 'Desserts') pull from both arrays simultaneously.
        const uniqueItems = [];
        const seenNames = new Set();
        for (const item of items) {
            const lowerName = item.name.toLowerCase().trim();
            if (!seenNames.has(lowerName)) {
                seenNames.add(lowerName);
                uniqueItems.push(item);
            }
        }
        items = uniqueItems;
        // ----------------------------------
        
        items.sort((a, b) => a.name.localeCompare(b.name));

        let html = '';
        if(!items.length) { 
            html = '<p class="subtle" style="text-align:center; padding: 20px;">No items found in this category.</p>'; 
        } else { 
            const groups = {};
            items.forEach(i => {
                let c = i.category || 'Uncategorized';
                if(!groups[c]) groups[c] = [];
                groups[c].push(i);
            });
            
            const catOrder = ['Breakfast', 'Lunch', 'Dinner', 'Dessert', 'Drinks', 'Cocktails'];
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                let iA = catOrder.findIndex(c => c.toLowerCase() === a.toLowerCase());
                let iB = catOrder.findIndex(c => c.toLowerCase() === b.toLowerCase());
                if (iA === -1) iA = 99; if (iB === -1) iB = 99; return iA - iB;
            });
            
            for(let g of sortedKeys) {
                html += `<h5 style="color:var(--color-primary); margin: 16px 0 8px 4px; font-size: 0.85rem; text-transform:uppercase; letter-spacing:1px;">${g}</h5>`;
                groups[g].forEach(i => {
                    const safeName = escapeHtml(i.name);
                    const jsSafeName = escapeJsArg(i.name);
                    const isRecent = cookedWithinAWeek(i.lastServed);
                    
                    let rowBackground = '';
                    let rightTag = '';
                    if (isRecent) {
                        const msSinceServed = Date.now() - new Date(i.lastServed).getTime();
                        const daysSinceServed = Math.floor(msSinceServed / (1000 * 3600 * 24));
                        const daysLeft = Math.max(1, 7 - daysSinceServed);
                        const fillPercent = (daysLeft / 7) * 100;
                        rowBackground = `background: linear-gradient(to right, color-mix(in oklab, var(--color-warning) 20%, var(--color-surface)) ${fillPercent}%, var(--color-surface) ${fillPercent}%); border-color: color-mix(in oklab, var(--color-warning) 30%, var(--color-border));`;
                        rightTag = `<span style="font-size: 0.8rem; color: var(--color-warning); font-weight: 700; margin-right: 8px;">⏳ ${daysLeft}d</span>`;
                    }
                    
                    html += `<div class="data-row" style="cursor: pointer; ${rowBackground}" onclick="openStandaloneCard('${jsSafeName}', '${i.src}')">
                                <div style="flex:1;"><span>${safeName}</span></div>
                                ${rightTag}
                                <button class="trash-btn" style="padding:4px;" onclick="event.stopPropagation(); confirmMealDeletionPrompt('${jsSafeName}', '${i.src}')">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                             </div>`;
                });
            }
        }
        document.getElementById('cookbookOutput').innerHTML = html;
    }

    function queueUnifiedEntry() {
        const m = document.getElementById('unified-meal-input').value.trim(); 
        const c = document.getElementById('unified-meal-category').value;
        if (m) { 
            const nameLower = m.toLowerCase();
            
            let existingMeal = null;
            let existingCategory = '';
            
            const queuedMatch = pendingApprovals.find(p => p.meal.toLowerCase() === nameLower);
            if (queuedMatch) {
                existingMeal = queuedMatch;
                existingCategory = queuedMatch.category;
            } else {
                const dbMatch = state.savedMeals.find(s => s.name.toLowerCase() === nameLower);
                if (dbMatch) {
                    existingMeal = dbMatch;
                    existingCategory = dbMatch.category;
                }
            }
            
            if (existingMeal) {
                if ((existingCategory || '').toLowerCase() === c.toLowerCase()) {
                    showToast("Meal already exists in this category.");
                    return;
                } else {
                    pendingDuplicateMeal = m;
                    pendingDuplicateCategory = c;
                    document.getElementById('duplicateMealMessage').innerHTML = `<b>${escapeHtml(existingMeal.name || existingMeal.meal)}</b> is already saved in your <b>${escapeHtml(existingCategory || 'existing')}</b> list.<br><br>Are you sure you want to add it to <b>${escapeHtml(c)}</b> too?`;
                    openModal('duplicateMealModal');
                    return;
                }
            }

            executeUnifiedEntrySave(m, c);
        }
    }

    async function submitQueueForApproval() {
      if (!pendingApprovals.length) return;
      const btn = document.getElementById('submitApprovalBtn'); btn.innerHTML = `Syncing...`;
      
      try {
          const payload = { action: 'sync_meals', data: JSON.stringify(pendingApprovals) };
          const response = await fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
          const parsed = await response.json();
          
          if (parsed.success !== false) {
              pendingApprovals.forEach(i => { 
                  state.savedMeals.push({
                      name: i.meal, category: i.category, diet: i.diet, lastServed: '', 
                      ingredients: i.ingredients, cuisine: i.cuisine || '', origin: i.origin || '', fact: i.fact || ''
                  }); 
              });
              pendingApprovals = []; 
              renderReviewQueue(); 
              updateCookbookStats(); 
              updateCookbookIconState();
              queueLocalSave(); 
              deckCache = {}; 
              
              btn.innerHTML = "✓ Synced"; 
          } else {
              throw new Error("Server rejected sync");
          }
      } catch (error) {
          showToast("Sync failed. Items saved locally in queue.");
          btn.innerHTML = "Retry Sync";
      }
      setTimeout(() => { if (btn.innerHTML === "✓ Synced" || btn.innerHTML === "Retry Sync") btn.innerHTML = "Push to Cloud"; }, 2000);
    }

    // ------------------------------------------------
    // GUIDED SHOPPING & PARTNERS
    // ------------------------------------------------
    let shoppingQueue = []; 
    let shoppingIndex = 0; 
    let activePlatform = 'Swiggy';
    let actuallyBought = []; 
    
    function launchShoppingApp(query, platform) {
        // Pre-flight State Persistence Safeguard
        saveStateLocally();
        flushCartSync();

        const encodedQuery = encodeURIComponent(query);
        let url = '';
        if (platform === 'Swiggy') {
            url = `https://www.instamart.in/search?query=${encodedQuery}`;
        } else if (platform === 'Blinkit') {
            url = `https://blinkit.com/s/?q=${encodedQuery}`;
        } else if (platform === 'BigBasket') {
            url = `https://www.bigbasket.com/ps/?q=${encodedQuery}`;
        } else if (platform === 'Amazon') {
            url = `https://www.amazon.in/s?k=${encodedQuery}`;
        } else if (platform === 'Flipkart') {
            url = `https://www.flipkart.com/search?q=${encodedQuery}&marketplace=HYPERLOCAL`;
        } else if (platform === 'Zepto') {
            url = `https://www.zeptonow.com/search?query=${encodedQuery}`;
        }
        
        if (url) {
            // Environment Platform Split Detection Check
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            
            if (platform === 'Zepto' && !isIOS) {
                // Android Platform Flow: open via isolated Chrome tab to preserve application memory focus
                window.open(url, '_blank');
            } else {
                // iOS Flow / Standard Redirect Pattern: execute sequential anchor link click path
                const link = document.createElement('a');
                link.href = url;
                link.target = '_self';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    }
    
    function startGuidedShopping(platform) {
      flushCartSync(); 
      
      shoppingQueue = [];
      // Clean DOM-Scraping Strategy to maintain perfect contextual visual display queue ordering
      document.querySelectorAll('#unified-cart-items .list-item-row.checked .item-name').forEach(node => {
          const matchedItem = state.grocery.find(i => i.name === node.textContent && i.inCart && i.checked);
          if (matchedItem) shoppingQueue.push(matchedItem);
      });
      
      if(!shoppingQueue.length) { showToast("Please check at least one item to shop."); return; }
      
      isShoppingActive = true;
      activePlatform = platform; 
      shoppingIndex = 0; 
      actuallyBought = [];
      
      // Lock viewport limits to prevent layout bounds reflow without erasing active DOM states
      document.body.style.overflow = 'hidden';
      
      updateGuidedUI(); 
      document.getElementById('guided-overlay').classList.add('active'); 
      launchShoppingApp(shoppingQueue[shoppingIndex].name, activePlatform);
    }
    
    function updateGuidedUI() {
      const itemsLeft = shoppingQueue.length - shoppingIndex;
      document.getElementById('shopping-countdown').innerText = itemsLeft;
    }
    
    function markFoundAndNext() {
      const current = shoppingQueue[shoppingIndex];
      actuallyBought.push(current.name);
      
      let item = state.grocery.find(i => i.name === current.name);
      if(item) { 
          item.inCart = false; item.checked = false; item.count++; item.mealContext=''; delete item.checkTime; 
          delete item.fuzzyOriginal;
          delete item.swappedFromPantry;
      }
      state.grocery = state.grocery.filter(i => !(i.category === 'Ghost' && !i.inCart)); 
      
      queueLocalSave();
      queueCartSync();
      
      shoppingIndex++;
      if(shoppingIndex >= shoppingQueue.length) { 
          closeGuidedShopping(); 
      } else { 
          updateGuidedUI();
          launchShoppingApp(shoppingQueue[shoppingIndex].name, activePlatform);
      }
    }
    
    function markNotFoundAndNext() {
      shoppingIndex++;
      if(shoppingIndex >= shoppingQueue.length) { closeGuidedShopping(); } 
      else { 
          updateGuidedUI();
          launchShoppingApp(shoppingQueue[shoppingIndex].name, activePlatform);
      }
    }
    
    function closeGuidedShopping() { 
        isShoppingActive = false;
        document.getElementById('guided-overlay').classList.remove('active'); 
        
        // Restore document scroll mechanics cleanly
        document.body.style.overflow = '';
        
        renderCart(); 
        
        if (actuallyBought.length > 0) {
            runServer('processExplicitCheckout', { boughtItems: actuallyBought }, true, true); 
            actuallyBought = [];
        }
    }

    function renderPartnerTogglesInline() {
        const partnersList = ['Swiggy', 'Blinkit', 'BigBasket', 'Amazon', 'Flipkart', 'Zepto'];
        let html = '<div style="display:flex; flex-direction:column; gap:12px; padding-bottom: 20px;">';
        
        partnersList.forEach(p => {
            const isChecked = (appSettings.partners || []).includes(p);
            html += `
            <label class="list-item-row ${isChecked ? 'checked' : ''}" style="cursor: pointer; margin-bottom: 0; display: flex; align-items: center; justify-content: flex-start; padding: 16px;">
                <input type="checkbox" value="${p}" style="display:none;" ${isChecked ? 'checked' : ''} onchange="handlePartnerToggle(this)">
                <div class="checkbox" style="margin-right: 16px; transition: 0.2s; ${isChecked ? 'background: var(--color-primary); color: var(--color-bg); border-color: var(--color-primary);' : ''}">${isChecked ? '✓' : ''}</div>
                <div class="item-name">${p}</div>
            </label>`;
        });
        html += '</div>';
        document.getElementById('ml-content').innerHTML = html;
    }

    function handlePartnerToggle(checkbox) {
        if(checkbox.checked) {
            if(!appSettings.partners.includes(checkbox.value)) appSettings.partners.push(checkbox.value);
        } else {
            appSettings.partners = appSettings.partners.filter(p => p !== checkbox.value);
        }
        queueLocalSave();
        renderShoppingPartners();
        renderPartnerTogglesInline(); 
    }

    function renderShoppingPartners() {
        const container = document.getElementById('shoppingPartnersGrid');
        if(!container) return;
        const partners = appSettings.partners || ['Swiggy', 'Blinkit'];
        
        const configs = {
            'Swiggy': { color: '#fc8019', textColor: '#fff', useFavicon: true, domain: 'swiggy.com', label: 'Swiggy' },
            'Blinkit': { color: '#f8cb46', textColor: '#000', useFavicon: true, domain: 'blinkit.com', label: 'Blinkit' },
            'BigBasket': { 
                color: '#689f38', 
                textColor: '#fff', 
                useFavicon: false, 
                label: 'BigBasket',
                svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px; height:24px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>`
            },
            'Amazon': { color: '#008296', textColor: '#fff', useFavicon: true, domain: 'amazon.in', label: 'Amazon' },
            'Flipkart': { color: '#ff3f6c', textColor: '#fff', useFavicon: true, domain: 'flipkart.com', label: 'Flipkart' },
            'Zepto': { 
                color: '#3b0062', 
                textColor: '#fff', 
                useFavicon: false, 
                label: 'Zepto',
                svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:24px; height:24px;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`
            }
        };
        
        container.innerHTML = partners.map(p => {
            const conf = configs[p] || { color: 'var(--color-primary)', textColor: 'var(--color-bg)', useFavicon: true, domain: 'google.com', label: p };
            
            let iconHtml = '';
            if (conf.useFavicon) {
                const faviconUrl = `https://www.google.com/s2/favicons?domain=${conf.domain}&sz=64`;
                iconHtml = `<img src="${faviconUrl}" alt="${p}" style="width:24px; height:24px; border-radius:4px; background:transparent; object-fit:contain; flex-shrink:0;">`;
            } else {
                iconHtml = conf.svg;
            }

            return `<button class="primary-btn" style="background: ${conf.color}; color: ${conf.textColor}; box-shadow: 0 4px 15px color-mix(in oklab, ${conf.color} 40%, transparent); font-size: 1.1rem; padding: 14px; border:none; display:flex; align-items:center; justify-content:center; gap:10px;" onclick="startGuidedShopping('${p}')">
                ${iconHtml}
                ${conf.label}
            </button>`;
        }).join('');
    }

    function saveStateLocally() { 
        localStorage.setItem('mp_data_v17', JSON.stringify(state)); 
        localStorage.setItem('mp_settings', JSON.stringify(appSettings)); 
        localStorage.setItem('mp_pending_v17', JSON.stringify(pendingApprovals));
    }

    function init() {
      try {
          const cachedSettings = localStorage.getItem('mp_settings');
          if (cachedSettings) {
              appSettings = JSON.parse(cachedSettings);
              if (appSettings.diet && typeof appSettings.diet === 'string') {
                  appSettings.diets = [appSettings.diet.toLowerCase()];
                  delete appSettings.diet;
              }
          }
      } catch(e) {}
      
      if (!appSettings.diets || !Array.isArray(appSettings.diets) || appSettings.diets.length === 0) {
          appSettings.diets = ['veg'];
      }
      if (appSettings.showInfo === undefined) appSettings.showInfo = false;
      if (!appSettings.partners || !Array.isArray(appSettings.partners) || appSettings.partners.length === 0) {
          appSettings.partners = ['Swiggy', 'Blinkit'];
      }
      
      // Automatic configuration state cleanup to erase legacy array structures
      if (appSettings.partners.includes('Amazon Now') || appSettings.partners.includes('Flipkart Minutes')) {
          appSettings.partners = appSettings.partners.map(p => {
              if (p === 'Amazon Now') return 'Amazon';
              if (p === 'Flipkart Minutes') return 'Flipkart';
              return p;
          });
          appSettings.partners = [...new Set(appSettings.partners)];
          queueLocalSave();
      }
      
      renderDietStripUI();
      if (appSettings.showInfo) document.getElementById('infoToggleBtn').classList.add('active');
      
      renderShoppingPartners();
      
      try {
          const cached = localStorage.getItem('mp_data_v17');
          if (cached) { 
              state = JSON.parse(cached); 
              if(!state.grocery) state.grocery = [];
              if(!state.savedMeals) state.savedMeals = [];
              if(!state.globalMeals) state.globalMeals = [];
              if(!state.currentSuggestions) state.currentSuggestions = [];
          } else {
              state = { grocery: [], savedMeals: [], globalMeals: [], currentSuggestions: [] };
          }
      } catch(e) { state = { grocery: [], savedMeals: [], globalMeals: [], currentSuggestions: [] }; }
      
      try {
          const cachedPending = localStorage.getItem('mp_pending_v17');
          if (cachedPending) pendingApprovals = JSON.parse(cachedPending);
      } catch(e) {}

      updateCookbookIconState();
      populateCategoryDropdowns(); 
      renderCart(); 
      
      activeCategory = null;
      document.querySelectorAll('.cat-btn, .meal-btn-full').forEach(btn => btn.classList.remove('active'));
      document.getElementById('generateBtn').style.opacity = '0.5';
      document.getElementById('suggestions').innerHTML = '';
      renderEmptyState();
      
      if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.includes("PASTE")) return;
      
      // Fallback for Master List Pull - Note that active cart logic is now entirely driven by Firebase DB
      fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllData' }) })
        .then(res => res.json())
        .then(parsed => { applyCloudData(parsed); })
        .catch(e => {  });
    }

    init();
  </script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
  
</body>
