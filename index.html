<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Planner</title>
  <style>
    /* -------------------------------------------------
       CSS VARIABLES & BASE STYLES
       ------------------------------------------------- */
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --card-bg: #f5f7fa;
      --border-color: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --text-muted: #64748b;
      --nav-bg: #ffffff;
      --radius: 12px;
      --base-font: 16px;
    }
    
    [data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #f1f5f9;
      --card-bg: #1e293b;
      --border-color: #334155;
      --primary: #3b82f6;
      --nav-bg: #0f172a;
    }
    
    [data-text="large"] {
      --base-font: 19px;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: var(--base-font);
      overscroll-behavior-y: none; /* Prevents pull-to-refresh */
      padding-bottom: 80px; /* Space for nav */
    }

    /* -------------------------------------------------
       NAVIGATION & LAYOUT
       ------------------------------------------------- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 65px; background: var(--nav-bg);
      border-top: 1px solid var(--border-color);
      display: flex; justify-content: space-around; align-items: center;
      z-index: 1000;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      color: var(--text-muted); cursor: pointer; font-size: 0.8rem;
    }
    .nav-item.active { color: var(--primary); font-weight: bold; }
    .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }
    
    /* -------------------------------------------------
       SETTINGS HEADER (Translate, Theme, Size)
       ------------------------------------------------- */
    .settings-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card-bg); padding: 12px; border-radius: var(--radius);
      margin-bottom: 20px;
    }
    .settings-group { display: flex; gap: 15px; align-items: center; }
    .icon-btn {
      background: none; border: none; font-size: 1.2rem;
      color: var(--text-color); cursor: pointer; display: flex; align-items: center;
    }
    #google_translate_element select {
      background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);
      border-radius: 4px; padding: 4px; max-width: 120px;
    }
    .skiptranslate iframe { display: none !important; } /* Hide google banner */
    body { top: 0px !important; } /* Fix google banner offset */

    /* -------------------------------------------------
       DUAL-FILTER UI (Plan Tab)
       ------------------------------------------------- */
    .filter-row-1 {
      display: flex; background: var(--card-bg); border-radius: var(--radius);
      padding: 4px; margin-bottom: 12px;
    }
    .source-btn {
      flex: 1; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer;
      font-weight: bold; color: var(--text-muted); transition: background 0.2s;
    }
    .source-btn.active { background: var(--primary); color: white; }

    .filter-row-2 { margin-bottom: 12px; }
    .meal-btn-full {
      width: 100%; padding: 14px; border-radius: var(--radius); background: var(--card-bg);
      color: var(--text-color); border: 2px solid transparent; font-weight: bold; cursor: pointer;
    }
    .meal-btn-full.active { border-color: var(--primary); }

    .filter-row-3 { display: flex; gap: 10px; margin-bottom: 20px; }
    .cat-btn {
      flex: 1; padding: 12px 5px; border-radius: var(--radius); background: var(--card-bg);
      color: var(--text-color); border: 2px solid transparent; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-align: center;
    }
    .cat-btn.active { border-color: var(--primary); }

    /* -------------------------------------------------
       CARDS & CART UI
       ------------------------------------------------- */
    .card {
      background: var(--card-bg); border-radius: var(--radius); padding: 16px;
      margin-bottom: 16px; border: 1px solid var(--border-color);
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-info h3 { margin: 0 0 5px 0; }
    .card-meta { font-size: 0.8rem; color: var(--text-muted); }
    .card-actions { display: flex; gap: 10px; }
    .action-btn { 
      background: var(--bg-color); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 8px 12px; cursor: pointer; color: var(--text-color);
    }
    
    .cart-group-title {
      font-size: 0.9rem; font-weight: bold; color: var(--primary);
      margin: 15px 0 5px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;
    }
    .cart-item {
      display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color);
      user-select: none; /* Required for long press */
    }
    .cart-item input[type="checkbox"] { margin-right: 15px; width: 20px; height: 20px; }
    .cart-item.checked { text-decoration: line-through; opacity: 0.6; }
    .delete-swipe { margin-left: auto; color: var(--danger); background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

    /* Quick Add Box */
    .quick-add-box {
      display: flex; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 12px; border-radius: var(--radius);
    }
    .quick-add-box input, .quick-add-box select {
      padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);
      background: var(--bg-color); color: var(--text-color);
    }
    .quick-add-box input { flex: 2; }
    .quick-add-box select { flex: 1; }
    .quick-add-box button { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 10px 15px; font-weight: bold; cursor: pointer; }

    /* Loader */
    #loader {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7); color: white;
      display: flex; justify-content: center; align-items: center; z-index: 2000;
      font-size: 1.2rem; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="loader">Syncing Database...</div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('planTab')">
      <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
      Plan
    </div>
    <div class="nav-item" onclick="switchTab('cartTab')">
      <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
      Cart
    </div>
    <div class="nav-item" onclick="switchTab('dbTab')">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      DB Manager
    </div>
  </div>

  <div id="planTab" class="tab-content active">
    
    <div class="settings-bar">
      <div class="settings-group">
        <button class="icon-btn" onclick="toggleTheme()">🌓</button>
        <button class="icon-btn" onclick="toggleTextSize()">Aa</button>
      </div>
      <div id="google_translate_element"></div>
    </div>

    <div class="filter-row-1">
      <div class="source-btn active" id="btn-source-cookbook" onclick="setSource('cookbook')">👤 Cookbook</div>
      <div class="source-btn" id="btn-source-global" onclick="setSource('global')">🧑‍🍳 Global</div>
    </div>
    
    <div class="filter-row-2">
      <button class="meal-btn-full active" id="btn-cat-meals" onclick="setCategory('Meals')">🍽️ Meals (Generate 3)</button>
    </div>
    
    <div class="filter-row-3">
      <button class="cat-btn" id="btn-cat-dessert" onclick="setCategory('Dessert')">🍰 Dessert</button>
      <button class="cat-btn" id="btn-cat-drinks" onclick="setCategory('Drinks')">🥤 Drinks</button>
      <button class="cat-btn" id="btn-cat-cocktails" onclick="setCategory('Cocktails')">🥂 Cocktails</button>
    </div>
    
    <button style="width:100%; padding: 15px; background: var(--success); color: white; font-weight: bold; border:none; border-radius: var(--radius); cursor:pointer; margin-bottom: 20px;" onclick="generateCards()">
      ✨ GENERATE
    </button>

    <div id="card-container"></div>
  </div>

  <div id="cartTab" class="tab-content">
    
    <div class="quick-add-box">
      <input type="text" id="quickAddInput" placeholder="Add or promote item...">
      <select id="quickAddCategory">
        <option value="📦 Uncategorized">📦 Uncategorized</option>
        <option value="🍎 Produce">🍎 Produce</option>
        <option value="🥛 Dairy & Eggs">🥛 Dairy & Eggs</option>
        <option value="🥩 Meat & Seafood">🥩 Meat & Seafood</option>
        <option value="🍞 Bakery">🍞 Bakery</option>
        <option value="🥫 Pantry">🥫 Pantry</option>
        <option value="🧂 Spices">🧂 Spices</option>
      </select>
      <button onclick="executeQuickAdd()">+</button>
    </div>

    <button style="width:100%; padding: 12px; background: var(--primary); color: white; font-weight: bold; border:none; border-radius: var(--radius); cursor:pointer; margin-bottom: 20px;" onclick="checkoutCart()">
      🛒 Finish Shopping
    </button>

    <div id="cart-container"></div>
  </div>

  <div id="dbTab" class="tab-content">
    <h2 style="margin-top:0;">Database Manager</h2>
    <p style="font-size:0.85rem; color: var(--text-muted);">Manage your permanent catalog. Ghost items from recipes are hidden here.</p>
    <div id="db-container"></div>
  </div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script>
    // App State
    let appData = { grocery: [], savedMeals: [], globalMeals: [] };
    let activeSource = 'cookbook';
    let activeCategory = 'Meals';
    
    // Theme & Size init
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    if (localStorage.getItem('textSize') === 'large') document.documentElement.setAttribute('data-text', 'large');

    function toggleTheme() {
      let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    
    function toggleTextSize() {
      let isLarge = document.documentElement.getAttribute('data-text') === 'large';
      document.documentElement.setAttribute('data-text', isLarge ? 'normal' : 'large');
      localStorage.setItem('textSize', isLarge ? 'normal' : 'large');
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.currentTarget.classList.add('active');
      if(tabId === 'cartTab') renderCart();
      if(tabId === 'dbTab') renderDB();
    }

    function showLoader() { document.getElementById('loader').style.display = 'flex'; }
    function hideLoader() { document.getElementById('loader').style.display = 'none'; }

    // Server Calls
    function runServer(funcName, ...args) {
      showLoader();
      google.script.run
        .withSuccessHandler(data => { appData = data; hideLoader(); updateUI(); })
        .withFailureHandler(err => { alert('Error: ' + err); hideLoader(); })
        [funcName](...args);
    }

    // Initial Load
    window.onload = () => runServer('handleGetAllData');

    function updateUI() {
      if(document.getElementById('cartTab').classList.contains('active')) renderCart();
      if(document.getElementById('dbTab').classList.contains('active')) renderDB();
    }

    // ----------------------------------------------------
    // PLAN TAB LOGIC
    // ----------------------------------------------------
    function setSource(src) {
      activeSource = src;
      document.getElementById('btn-source-cookbook').classList.toggle('active', src === 'cookbook');
      document.getElementById('btn-source-global').classList.toggle('active', src === 'global');
    }

    function setCategory(cat) {
      activeCategory = cat;
      document.getElementById('btn-cat-meals').classList.toggle('active', cat === 'Meals');
      document.getElementById('btn-cat-dessert').classList.toggle('active', cat === 'Dessert');
      document.getElementById('btn-cat-drinks').classList.toggle('active', cat === 'Drinks');
      document.getElementById('btn-cat-cocktails').classList.toggle('active', cat === 'Cocktails');
    }

    function generateCards() {
      const container = document.getElementById('card-container');
      container.innerHTML = '';
      
      const pool = activeSource === 'cookbook' ? appData.savedMeals : appData.globalMeals;
      let filtered = [];
      
      if (activeCategory === 'Meals') {
        filtered = pool.filter(m => m.category !== 'Dessert' && m.category !== 'Drinks' && m.category !== 'Cocktails');
      } else {
        filtered = pool.filter(m => String(m.category).toLowerCase() === activeCategory.toLowerCase());
      }

      if (filtered.length === 0) {
        container.innerHTML = `<p style="color:var(--text-muted); text-align:center;">No items found in this category.</p>`;
        return;
      }

      // Shuffle
      filtered.sort(() => 0.5 - Math.random());
      
      const cardsToDeal = activeCategory === 'Meals' ? 3 : 1;
      const dealt = filtered.slice(0, cardsToDeal);

      dealt.forEach(meal => {
        let isRecentlyServed = false;
        if(meal.lastServed) {
          const daysDiff = (new Date() - new Date(meal.lastServed)) / (1000 * 60 * 60 * 24);
          if (daysDiff <= 7) isRecentlyServed = true;
        }
        
        let actionsHTML = '';
        const safeIngredients = meal.ingredients.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const safeName = meal.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

        if (activeSource === 'global') {
          actionsHTML += `<button class="action-btn" onclick="saveGlobalMeal('${safeName}', '${meal.category}', '${meal.diet}', '${safeIngredients}')">🔖 Save</button>`;
        }
        
        if (meal.ingredients && meal.ingredients !== '[]' && meal.ingredients !== '') {
          actionsHTML += `<button class="action-btn" onclick="addRecipeToCart('${safeIngredients}', '${safeName}')">🛒 Cart</button>`;
        }
        
        actionsHTML += `<button class="action-btn" onclick="markServed('${safeName}', '${activeSource}')">✓ On Menu</button>`;

        container.innerHTML += `
          <div class="card">
            <div class="card-info">
              <h3>${meal.name}</h3>
              <div class="card-meta">
                ${meal.category} • ${meal.diet || 'N/A'}
                ${isRecentlyServed ? '<br><span style="color:var(--danger)">⚠️ Served recently</span>' : ''}
              </div>
            </div>
            <div class="card-actions">
              ${actionsHTML}
            </div>
          </div>
        `;
      });
    }

    function saveGlobalMeal(name, category, diet, ingredients) {
      runServer('handleSaveGlobalMeal', name, category, diet, ingredients);
    }
    
    function addRecipeToCart(ingredientsJson, mealName) {
      try {
        const ingredients = JSON.parse(ingredientsJson.replace(/&quot;/g, '"'));
        if(Array.isArray(ingredients)) runServer('handleAddRecipeToCart', ingredients, mealName);
      } catch(e) { alert('Failed to parse ingredients.'); }
    }
    
    function markServed(name, source) {
      const sheetName = source === 'cookbook' ? 'My_Saved_Meals' : 'AI_Discovery_Pool';
      runServer('handleMarkMealServed', name, sheetName);
    }

    // ----------------------------------------------------
    // CART & QUICK ADD (WITH LONG PRESS GHOST PROMOTION)
    // ----------------------------------------------------
    function executeQuickAdd() {
      const input = document.getElementById('quickAddInput');
      const cat = document.getElementById('quickAddCategory').value;
      if (input.value.trim() === '') return;
      
      runServer('handleAddOrPromoteItem', input.value.trim(), cat);
      input.value = '';
    }

    let pressTimer;
    function touchStart(e, itemName, isGhost) {
      if(!isGhost) return;
      pressTimer = setTimeout(() => {
        // Long Press Activated! Promote Flow
        const safeName = itemName.replace(/\\'/g, "'").replace(/&quot;/g, '"');
        document.getElementById('quickAddInput').value = safeName;
        document.getElementById('quickAddCategory').focus();
        // Vibrate if supported
        if(navigator.vibrate) navigator.vibrate(50);
      }, 500);
    }
    function touchEnd(e) { clearTimeout(pressTimer); }
    function touchMove(e) { clearTimeout(pressTimer); } // Cancel on scroll

    function renderCart() {
      const container = document.getElementById('cart-container');
      container.innerHTML = '';
      
      const cartItems = appData.grocery.filter(item => item.inCart);
      
      if (cartItems.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:20px;">Cart is empty.</p>`;
        return;
      }

      // Grouping: By Meal Context first, then by normal category
      const groups = {};
      cartItems.forEach(item => {
        let groupName = item.mealContext ? `For ${item.mealContext}` : item.category;
        if (!groups[groupName]) groups[groupName] = [];
        groups[groupName].push(item);
      });

      for (let group in groups) {
        container.innerHTML += `<div class="cart-group-title">${group}</div>`;
        groups[group].forEach(item => {
          const isGhost = item.category === 'Ghost';
          const safeName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
          
          container.innerHTML += `
            <div class="cart-item ${item.checked ? 'checked' : ''}" 
                 ontouchstart="touchStart(event, '${safeName}', ${isGhost})" 
                 ontouchend="touchEnd(event)" 
                 ontouchmove="touchMove(event)">
              <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="runServer('handleToggleCartItem', '${safeName}', this.checked)">
              <span>${item.name} ${isGhost ? '👻' : ''}</span>
              <button class="delete-swipe" onclick="runServer('handleRemoveFromCart', '${safeName}')">✖</button>
            </div>
          `;
        });
      }
    }

    function checkoutCart() {
      if(confirm('Finish shopping? Checked items will be logged and ghosts purged.')) {
        runServer('handleCheckout');
      }
    }

    // ----------------------------------------------------
    // DB MANAGER TAB
    // ----------------------------------------------------
    function renderDB() {
      const container = document.getElementById('db-container');
      container.innerHTML = '';
      
      // Filter out Ghosts
      const permItems = appData.grocery.filter(item => item.category !== 'Ghost');
      
      if(permItems.length === 0) {
        container.innerHTML = `<p>No permanent items yet.</p>`;
        return;
      }

      permItems.forEach(item => {
        const safeName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        container.innerHTML += `
          <div class="card" style="padding: 10px;">
            <div style="flex:2;"><strong>${item.name}</strong><br><span class="card-meta">Bought: ${item.count} times</span></div>
            <select style="flex:1; padding: 5px; margin-right: 10px;" onchange="runServer('handleUpdateMasterCategory', '${safeName}', this.value)">
              <option value="${item.category}">${item.category}</option>
              <option value="🍎 Produce">🍎 Produce</option>
              <option value="🥛 Dairy & Eggs">🥛 Dairy & Eggs</option>
              <option value="🥩 Meat & Seafood">🥩 Meat & Seafood</option>
              <option value="🍞 Bakery">🍞 Bakery</option>
              <option value="🥫 Pantry">🥫 Pantry</option>
              <option value="🧂 Spices">🧂 Spices</option>
              <option value="📦 Uncategorized">📦 Uncategorized</option>
            </select>
            <button class="delete-swipe" style="margin:0;" onclick="if(confirm('Delete permanently?')) runServer('handleDeleteMasterItem', '${safeName}')">🗑</button>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
