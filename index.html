<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Meal Planner Pro</title>
  <link rel="apple-touch-icon" href="icon-512x512-1.png">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  
  <style>
    :root, [data-theme="light"] {
      --color-bg: #ffffff; 
      --color-surface: #f7f6f2; 
      --color-surface-2: #f2f1ed; 
      --color-border: #e0deda; 
      --color-divider: #e0deda; 
      --color-text: #161514; 
      --color-text-muted: #6b6965; 
      --color-primary: #01696f; 
      --color-secondary: #e8af34; 
      --color-success: #38661c; 
      --color-warning: #c26502; 
      --color-error: #8f266d;
      --font-body: 'General Sans', sans-serif; 
      --font-display: 'Boska', serif;
      --shadow-md: 0 12px 32px rgba(0,0,0,0.1); 
      --ease-fluid: cubic-bezier(0.2, 0, 0, 1); 
    }
    
    [data-theme="dark"] {
      --color-bg: #000000; 
      --color-surface: #121110; 
      --color-surface-2: #1a1918; 
      --color-border: rgba(255, 255, 255, 0.05); 
      --color-divider: rgba(255, 255, 255, 0.08); 
      --color-text: #e8e6e3; 
      --color-text-muted: #918f8b; 
      --color-primary: #80c7d2; 
      --color-secondary: #e6c57a; 
      --color-success: #78a85d; 
      --color-warning: #e39d5b; 
      --color-error: #e57373;
      --shadow-md: 0 16px 40px rgba(0,0,0, 1);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; height: 100%; overscroll-behavior-y: none; }
    body { min-height: 100%; font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); overflow-x: hidden; overscroll-behavior-y: none; user-select: none; }

    html.text-scale-110 { font-size: 110%; }
    html.text-scale-120 { font-size: 120%; }

    input, textarea { user-select: auto; }
    button, select { font: inherit; color: inherit; outline: none; background: none; border: none; cursor: pointer; }
    
    .topbar-wrapper { position: relative; width: 100%; max-width: 70rem; margin: 0 auto; padding: calc(1.5rem + env(safe-area-inset-top)) 1rem 1rem; z-index: 40; display: flex; flex-direction: column; gap: 10px; }
    .topbar-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-logo { width: 2.75rem; height: 2.75rem; border-radius: 1rem; display: grid; place-items: center; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: #000; font-weight: bold; }
    h1 { font-family: var(--font-display); font-size: 1.75rem; font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
    
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .icon-btn, .ghost-btn, .primary-btn, .accent-btn { border-radius: 2rem; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; transition: transform 0.2s var(--ease-fluid), background 0.2s var(--ease-fluid); padding: 0.75rem 1.5rem; }
    .icon-btn { width: 44px; padding: 0; border: 1px solid var(--color-border); background: var(--color-surface); height: 44px; }
    .ghost-btn { background: var(--color-surface); border: 1px solid var(--color-border); height: 44px; }
    .primary-btn { background: var(--color-primary); color: var(--color-bg); box-shadow: 0 4px 15px color-mix(in oklab, var(--color-primary) 30%, transparent); }
    .accent-btn { background: var(--color-secondary); color: var(--color-bg); }
    button:active { transform: scale(0.92); }

    .shell { max-width: 70rem; margin: 0 auto; padding: 1rem 1rem calc(6rem + env(safe-area-inset-bottom)); }
    .page { display: none; animation: fadePeek 0.35s var(--ease-fluid); }
    .page.active { display: block; }
    @keyframes fadePeek { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .filter-wrapper { margin-bottom: 20px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .filter-row-1 { display: flex; background: var(--color-surface); border-radius: 2rem; border: 1px solid var(--color-border); padding: 4px; }
    .source-btn { flex: 1; text-align: center; padding: 12px; border-radius: 1.5rem; cursor: pointer; font-weight: 600; color: var(--color-text-muted); transition: background 0.2s, color 0.2s; }
    .source-btn.active { background: var(--color-primary); color: var(--color-bg); }
    
    .filter-row-2 .meal-btn-full { width: 100%; padding: 16px; border-radius: 1.5rem; background: var(--color-surface); color: var(--color-text); border: 2px solid transparent; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
    .filter-row-2 .meal-btn-full.active { border-color: var(--color-primary); background: color-mix(in oklab, var(--color-primary) 10%, var(--color-surface)); }
    
    .filter-row-3 { display: flex; gap: 8px; }
    .cat-btn { flex: 1; padding: 14px 4px; border-radius: 1.5rem; background: var(--color-surface); color: var(--color-text); border: 2px solid transparent; font-weight: 600; cursor: pointer; font-size: 0.95rem; text-align: center; transition: 0.2s; }
    .cat-btn.active { border-color: var(--color-primary); background: color-mix(in oklab, var(--color-primary) 10%, var(--color-surface)); }

    .cards { display: grid; gap: 1.5rem; }
    .meal-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 2rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; animation: slideUpFade 0.35s var(--ease-fluid) backwards; position: relative; }
    .meal-card.locked { border-color: color-mix(in oklab, var(--color-success) 50%, transparent); box-shadow: 0 0 20px color-mix(in oklab, var(--color-success) 10%, transparent); }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-header-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .eyebrow { font-size: 0.8rem; text-transform: uppercase; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.1em; }
    .badge { padding: 4px 12px; border-radius: 2rem; font-size: 0.75rem; font-weight: 700; background: color-mix(in oklab, var(--color-success) 15%, transparent); color: var(--color-success); border: 1px solid color-mix(in oklab, var(--color-success) 20%, transparent); }
    .badge.tag-nonveg { background: color-mix(in oklab, var(--color-error) 15%, transparent); color: var(--color-error); border-color: color-mix(in oklab, var(--color-error) 20%, transparent); }
    .badge.warning { background: color-mix(in oklab, var(--color-secondary) 15%, transparent); color: var(--color-secondary); border-color: color-mix(in oklab, var(--color-secondary) 20%, transparent); }
    
    .meal-title { font-family: var(--font-display); font-size: 2.1rem; line-height: 1.1; font-weight: 600; margin: 0.25rem 0; color: var(--color-text); }
    
    .top-actions { display: flex; gap: 8px; flex-direction: row; }
    .icon-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--color-surface-2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-border); cursor: pointer; transition: transform 0.2s var(--ease-fluid), background 0.2s; color: var(--color-text); }
    .icon-circle:active { transform: scale(0.85); }
    
    .card-action { min-height: 52px; font-weight: 600; border: 1px solid var(--color-border); border-radius: 1.25rem; background: var(--color-surface-2); color: var(--color-text); display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0.5rem 1rem; transition: transform 0.2s var(--ease-fluid), background 0.2s, border-color 0.2s; }
    .card-action.locked { background: var(--color-success); color: var(--color-bg); border-color: var(--color-success); }
    .card-action:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .explore-area { display: flex; justify-content: space-around; align-items: center; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s var(--ease-fluid), opacity 0.3s var(--ease-fluid), margin 0.3s var(--ease-fluid); margin-top: -10px; width: 100%; }
    .explore-area.open { max-height: 100px; opacity: 1; margin-top: 5px; padding: 12px 0; border-top: 1px solid var(--color-divider); }
    .explore-icon { width: 56px; height: 56px; border-radius: 1rem; background: var(--color-surface); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; transition: transform 0.2s var(--ease-fluid); flex-shrink: 0; color: var(--color-text); flex-direction: column; font-size: 0.65rem; font-weight: bold; gap: 4px; }
    .explore-icon svg { width: 20px; height: 20px; }
    .explore-icon:active { transform: scale(0.85); }
    
    .empty { padding: 3rem 2rem; background: var(--color-surface); border-radius: 2rem; border: 1px solid var(--color-border); color: var(--color-text-muted); text-align: center; width: 100%; }
    
    .bottom-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 400px; display: flex; gap: 12px; z-index: 1000; transition: transform 0.35s var(--ease-fluid), opacity 0.35s var(--ease-fluid); pointer-events: none; }
    .bottom-nav.nav-hidden { transform: translate(-50%, 150%); opacity: 0; }
    .bottom-nav button { margin: 0; border-radius: 100px; pointer-events: auto; box-shadow: var(--shadow-md); }

    .floating-share-fab { position: fixed; bottom: 100px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #1a1918; border: 1px solid var(--color-border); color: #e8e6e3; box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center; z-index: 999; transition: transform 0.3s var(--ease-fluid), opacity 0.3s; }
    [data-theme="light"] .floating-share-fab { background: #f7f6f2; color: #161514; }
    .floating-share-fab:active { transform: scale(0.88); }
    .floating-share-fab.fab-hidden { transform: scale(0); opacity: 0; pointer-events: none; }

    .cart-tools { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; width: 100%; }
    .cart-tools input { flex: 1; padding: 14px 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface); font-size: 1rem; color: var(--color-text); transition: 0.2s; min-width: 0; height: 56px; }
    .cart-tools select { flex: 0 0 100px; width: 100px; padding: 0 8px; height: 56px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); font-family: var(--font-body); font-size: 0.85rem; -webkit-appearance: none; appearance: none; outline: none; text-overflow: ellipsis; }
    
    .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-muted); font-weight: bold; margin: 24px 0 12px; }
    
    .list-item-row { display: flex; align-items: center; justify-content: space-between; background: var(--color-surface); padding: 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); margin-bottom: 12px; transition: transform 0.2s var(--ease-fluid), opacity 0.3s; width: 100%; }
    .list-item-row:active { transform: scale(0.97); }
    .list-item-row.dimmed { opacity: 0.45; background: transparent; }
    .list-item-left { display: flex; align-items: center; gap: 16px; flex: 1; cursor: pointer; }
    .checkbox { width: 24px; height: 24px; border: 2px solid var(--color-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: transparent; transition: 0.2s var(--ease-fluid); flex-shrink: 0; font-weight: bold; }
    .list-item-row.checked .checkbox { background: var(--color-primary); color: var(--color-bg); }
    .item-name { font-size: 1.125rem; font-weight: 600; text-transform: capitalize; color: var(--color-text); }
    .trash-btn { background: none; border: none; font-size: 1.25rem; color: var(--color-error); padding: 8px; border-radius: 50%; cursor: pointer; transition: transform 0.2s var(--ease-fluid); }
    .trash-btn:active { transform: scale(0.8); }
    
    .cart-group-title { font-size: 0.85rem; font-weight: bold; color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.05em; margin: 15px 0 5px 8px; }
    .cart-accordion-header { display: flex; justify-content: space-between; align-items: center; background: var(--color-surface-2); padding: 16px 20px; border-radius: 1.5rem; border: 1px solid var(--color-border); cursor: pointer; user-select: none; margin-bottom: 16px; }
    .cart-group-header { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--color-primary); margin: 0; padding: 0; }
    .cart-chevron { font-size: 1.25rem; transition: transform 0.3s var(--ease-fluid); color: var(--color-text-muted); }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 2000; }
    .modal.open { display: flex; }
    .dialog { background: var(--color-surface); width: 100%; max-width: 520px; max-height: 85vh; border-radius: 2rem; border: 1px solid var(--color-border); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-md); animation: fadePeek 0.35s var(--ease-fluid); }
    .dialog-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
    
    .dialog-body { padding: 0; display: flex; flex-direction: column; overflow: hidden; }
    .master-header-box { padding: 20px 20px 0 20px; flex-shrink: 0; }
    .master-scroll-box { padding: 0 20px 20px 20px; overflow-y: auto; flex: 1; }
    
    .master-search-bar { width: 100%; padding: 14px 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface-2); font-size: 1rem; color: var(--color-text); margin-bottom: 12px; }
    
    .filter-ribbon { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; margin-bottom: 8px; -ms-overflow-style: none; scrollbar-width: none; }
    .filter-ribbon::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 10px 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface-2); font-weight: 600; font-size: 0.9rem; color: var(--color-text); cursor: pointer; white-space: nowrap; transition: 0.2s var(--ease-fluid); }
    .filter-chip.active { background: var(--color-primary); border-color: var(--color-primary); color: var(--color-bg); }
    
    .filter-chip.top-picks { border-color: #ffd700; color: #ffd700; }
    .filter-chip.top-picks.active { background: #ffd700; color: #000; }
    
    .sync-indicator { position: fixed; top: 10px; right: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: bold; color: var(--color-text-muted); background: var(--color-surface-2); padding: 6px 12px; border-radius: 2rem; opacity: 0; transition: 0.3s; z-index: 9999; }
    .sync-indicator.active { opacity: 1; }
    .sync-spinner { width: 12px; height: 12px; border: 2px solid var(--color-text-muted); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .review-queue-list { list-style: none; display: grid; gap: 10px; margin: 0; padding: 0; }
    .review-queue-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--color-surface-2); border-radius: 1rem; justify-content: space-between; }
    .review-queue-item select { padding: 6px; border-radius: 8px; background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); font-family: var(--font-body); font-weight: bold; height: 36px; }
    
    .guided-overlay { position: fixed; inset: 0; background: var(--color-bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s var(--ease-fluid); padding: 24px; text-align: center; }
    .guided-overlay.active { opacity: 1; pointer-events: auto; }
    .shopping-progress { color: var(--color-text-muted); font-size: 16px; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .shopping-item-name { font-size: 36px; font-weight: bold; margin-bottom: 48px; color: var(--color-text); text-transform: capitalize; font-family: var(--font-display); }
    .close-shopping { position: absolute; top: 40px; right: 24px; font-size: 24px; color: var(--color-text-muted); background: none; border: none; cursor: pointer; transition: transform 0.2s var(--ease-fluid); }
    .close-shopping:active { transform: scale(0.8); }
    
    .data-row { display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; padding: 1rem 1.5rem; border: 1px solid var(--color-border); border-radius: 1.25rem; background: var(--color-surface); font-size: 1rem; margin-bottom: 8px; width: 100%; transition: transform 0.2s var(--ease-fluid); }
    .data-row:active { transform: scale(0.98); }
    
    .topbar-hidden { display: none !important; }

    .diet-toggle-container { display: flex; background: var(--color-surface-2); border-radius: 2rem; border: 1px solid var(--color-border); padding: 4px; width: 100%; margin-bottom: 20px; }
    .diet-btn { flex: 1; padding: 12px; font-weight: 600; border-radius: 1.5rem; text-align: center; color: var(--color-text-muted); transition: 0.3s var(--ease-fluid); }
    .diet-btn.active.veg { background: var(--color-success); color: var(--color-bg); }
    .diet-btn.active.nonveg { background: var(--color-error); color: var(--color-bg); }

    .stat-btn { height: auto; padding: 16px; flex-direction: column; border-radius: 1.5rem; transition: 0.2s var(--ease-fluid); }
    .stat-num { font-size: 1.5rem; margin-bottom: 4px; font-weight: bold; }
    .stat-title { font-size: 0.8rem; color: var(--color-text-muted); transition: 0.2s; }
    .stat-btn.active { background: var(--color-primary); border-color: var(--color-primary); transform: scale(1.02); }
    .stat-btn.active .stat-num, .stat-btn.active .stat-title { color: var(--color-bg); }
    
    .toast-container { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; margin-top: 20px; width: 90%; max-width: 400px;}
    .toast { background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); padding: 16px 20px; border-radius: 1.5rem; box-shadow: var(--shadow-md); font-weight: 600; font-size: 0.95rem; text-align: center; animation: toastSlide 0.3s var(--ease-fluid) forwards; transition: opacity 0.3s; pointer-events: auto; }
    @keyframes toastSlide { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .top-settings-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; background: var(--color-surface-2); padding: 12px; border-radius: 1.5rem; border: 1px solid var(--color-border); }
  </style>
</head>
<body>
  
  <div class="sync-indicator" id="syncIndicator"><div class="sync-spinner"></div> System Sync...</div>

  <div class="topbar-wrapper" id="mainTopbar">
    <div class="topbar-main">
      <div class="brand"><img class="brand-logo" src="icon-512x512.png" alt="Logo" style="object-fit: cover; padding: 0; border: none; background: transparent;" /><h1>Meal Planner</h1></div>
      <div class="header-actions" id="topbar-plan-actions">
        <button class="icon-btn" onclick="toggleTextSize()" style="font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; padding: 0;">Aa</button>
        <button class="icon-btn" data-theme-toggle></button>
        <button class="ghost-btn" id="openDataBtn" onclick="openCookbook()">
            <svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="shell">
    <main id="main">
      <div id="page-plan" class="page active">
        <section class="hero">
          <div class="filter-wrapper">
            <div class="filter-row-1">
              <div class="source-btn active" id="btn-src-cookbook" onclick="setSource('cookbook')">👤 Cookbook</div>
              <div class="source-btn" id="btn-src-global" onclick="setSource('global')">🧑‍🍳 Global</div>
            </div>
            <div class="filter-row-2">
              <button class="meal-btn-full" id="btn-cat-meals" onclick="setCategory('Meals')">🍽️ Meals</button>
            </div>
            <div class="filter-row-3">
              <button class="cat-btn" id="btn-cat-dessert" onclick="setCategory('Dessert')">🍰 Dessert</button>
              <button class="cat-btn" id="btn-cat-drinks" onclick="setCategory('Drinks')">🥤 Drinks</button>
              <button class="cat-btn" id="btn-cat-cocktails" onclick="setCategory('Cocktails')">🥂 Cocktails</button>
            </div>
          </div>
        </section>
        <section class="section"><div id="suggestions" class="cards" aria-live="polite"></div></section>
      </div>

      <div id="page-cart" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; padding-top: calc(1rem + env(safe-area-inset-top));">
          <h2 style="font-family:var(--font-display); font-size:2rem; font-weight:600;">Grocery Cart</h2>
          <div style="display:flex; gap:8px; align-items: center;">
            <button class="ghost-btn" id="undoBtn" style="opacity: 0.3; pointer-events: none; padding: 0 12px; border:none; background:transparent; color:var(--color-primary); font-size: 0.95rem; font-weight: 700;" onclick="undoDelete()">⟲ Undo</button>
            <button class="icon-btn" onclick="shareCartToWhatsApp()">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="20" height="20"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
            </button>

                   <button onclick="submitQueueForApproval()" id="submitApprovalBtn" style="color:var(--color-success); font-weight:bold; background:none; border:none; cursor:pointer;">Push to Cloud</button>

  <script>
    const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzNOXoxn17I3d4-inuxiEqhdPxOQokGlSGCYW8buwLTcO6YJxbvcHBH0dZ1d-fBDzwl/exec"; 
    
    let state = { grocery: [], savedMeals: [], globalMeals: [], currentSuggestions: [] };
    let appSettings = { diet: 'veg' }; 
    let pendingApprovals = []; let graveyard = []; let deckCache = {}; 
    let activeTab = 'plan'; let activeMasterCategory = 'All'; let isCartExpanded = false;
    let activeSource = 'cookbook'; let activeCategory = null;
    let currentRenderedCacheKey = '';

    function runServer(action, payload = {}, silent = true) {
        if (!silent) document.getElementById('syncIndicator').classList.add('active');
        payload.action = action;
        
        fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(parsed => {
            if (!silent) document.getElementById('syncIndicator').classList.remove('active');
        }).catch(e => {
            if (!silent) document.getElementById('syncIndicator').classList.remove('active');
        });
    }

    let currentTextSize = parseInt(localStorage.getItem('mp_text_size') || '0', 10);
    applyTextSize();
    
    function toggleTextSize() { 
        currentTextSize = (currentTextSize + 1) % 3; 
        localStorage.setItem('mp_text_size', currentTextSize.toString()); 
        applyTextSize(); 
    }
    
    function applyTextSize() {
        const root = document.documentElement; 
        root.classList.remove('text-scale-110', 'text-scale-120');
        if (currentTextSize === 1) root.classList.add('text-scale-110');
        if (currentTextSize === 2) root.classList.add('text-scale-120');
    }

    let lastScrollY = window.scrollY; 
    const bottomNav = document.getElementById('bottomNav');
    
    window.addEventListener('scroll', () => {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 60) bottomNav.classList.add('nav-hidden');
        else bottomNav.classList.remove('nav-hidden');
        lastScrollY = currentScrollY;
    }, { passive: true });

    function toggleMainView() {
        if(activeTab === 'plan') {
            switchTab('cart');
            activeTab = 'cart';
        } else {
            switchTab('plan');
            activeTab = 'plan';
        }
    }

    let touchstartX = 0; let touchendX = 0;
    document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
    document.addEventListener('touchend', e => { 
        if (document.querySelector('.modal.open') || document.getElementById('guided-overlay').classList.contains('active')) return;
        touchendX = e.changedTouches[0].screenX; 
        if (touchendX < touchstartX - 100 && activeTab === 'plan') toggleMainView();
        if (touchendX > touchstartX + 100 && activeTab === 'cart') toggleMainView();
    }, {passive: true});

    function toggleCartDropdown() {
        isCartExpanded = !isCartExpanded;
        document.getElementById('unified-cart-items').style.display = isCartExpanded ? 'block' : 'none';
        document.getElementById('cartChevron').style.transform = isCartExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function showToast(message) {
        let container = document.getElementById('toastContainer');
        if(!container) { 
            container = document.createElement('div'); 
            container.id = 'toastContainer'; 
            container.className = 'toast-container'; 
            document.body.appendChild(container); 
        }
        const toast = document.createElement('div'); 
        toast.className = 'toast'; 
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3500);
    }

    function fuzzyMatch(query, target) {
        let q = query.toLowerCase().replace(/omelette/g, 'omelet');
        let t = target.toLowerCase().replace(/omelette/g, 'omelet');
        const terms = q.split(' ').filter(Boolean);
        return terms.every(term => t.includes(term));
    }

    function escapeHtml(str) { 
        return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); 
    }
    
    function openModal(modalId) { 
        document.getElementById(modalId).classList.add('open'); 
    }
    
    function closeModal(modalId) { 
        document.getElementById(modalId).classList.remove('open'); 
    }

    (() => {
      const themeBtn = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      const renderThemeIcon = () => { 
          themeBtn.innerHTML = theme === 'dark' 
            ? '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>' 
            : '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'; 
      };
      renderThemeIcon();
      themeBtn.addEventListener('click', () => { 
          theme = theme === 'dark' ? 'light' : 'dark'; 
          root.setAttribute('data-theme', theme); 
          renderThemeIcon(); 
      });
    })();

    function switchTab(tabId) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById(`page-${tabId}`).classList.add('active');
      const topbar = document.getElementById('mainTopbar'), fab = document.getElementById('floatingShareFab'), genBtn = document.getElementById('generateBtn'), navToggleBtn = document.getElementById('navToggleBtn');
      if (tabId === 'cart') {
          topbar.classList.add('topbar-hidden'); fab.classList.add('fab-hidden'); genBtn.style.display = 'none'; navToggleBtn.innerHTML = '🍽️ Plan';
      } else {
          topbar.classList.remove('topbar-hidden'); fab.classList.remove('fab-hidden'); genBtn.style.display = 'flex'; navToggleBtn.innerHTML = '🛒 Cart';
      }
    }

    function updateUndoButton() {
        const btn = document.getElementById('undoBtn');
        if (graveyard.length > 0) { 
            btn.style.opacity = '1'; 
            btn.style.pointerEvents = 'auto'; 
            btn.innerHTML = `⟲ Undo (${graveyard.length})`; 
        } else { 
            btn.style.opacity = '0.3'; 
            btn.style.pointerEvents = 'none'; 
            btn.innerHTML = `⟲ Undo`; 
        }
    }

    function executeSoftDelete(context, nameStr) {
        if(navigator.vibrate) navigator.vibrate(15);
        const idx = state.grocery.findIndex(i => i.name.toLowerCase() === nameStr.toLowerCase());
        
        if(idx > -1) {
            const item = state.grocery[idx];
            graveyard.push({ context: 'cart', item: JSON.parse(JSON.stringify(item)), originalIndex: idx }); 
            
            if(context === 'cart') {
                item.inCart = false; 
                item.checked = false; 
                item.mealContext = '';
                if(item.category === 'Ghost') state.grocery.splice(idx, 1);
                renderCart(); 
                saveStateLocally(); 
                runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)});
            } else if (context === 'master') {
                state.grocery.splice(idx, 1);
                filterMasterList(); 
                saveStateLocally(); 
                runServer('deleteMasterItem', {item: item.name});
            }
            updateUndoButton();
        }
    }

    function undoDelete() {
        if (!graveyard.length) return;
        const last = graveyard.pop();
        
        if(last.context === 'cart') {
            let existing = state.grocery.find(i => i.name.toLowerCase() === last.item.name.toLowerCase());
            if(existing) { 
                existing.inCart = true; 
                existing.checked = last.item.checked; 
                existing.mealContext = last.item.mealContext; 
            } else { 
                state.grocery.push(last.item); 
            }
            renderCart(); 
            saveStateLocally(); 
            runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)});
        } else if (last.context === 'master') {
            state.grocery.splice(last.originalIndex, 0, last.item);
            filterMasterList(); 
            saveStateLocally(); 
            runServer('addMasterItem', {item: last.item.name, category: last.item.category});
        }
        updateUndoButton();
    }
    
    function flushGraveyardCache() {
        if (!graveyard.length) return;
        runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)});
        graveyard = []; 
        updateUndoButton();
    }

    window.addEventListener("visibilitychange", () => { 
        if (document.visibilityState === "hidden") flushGraveyardCache(); 
    });
    window.addEventListener("pagehide", flushGraveyardCache);

    function setSource(src) {
        activeSource = src;
        document.getElementById('btn-src-cookbook').classList.toggle('active', src === 'cookbook');
        document.getElementById('btn-src-global').classList.toggle('active', src === 'global');
        
        document.getElementById('suggestions').innerHTML = '';
        renderEmptyState();
        currentRenderedCacheKey = '';
    }

    function setCategory(cat) {
        if (activeCategory === cat) {
            activeCategory = null;
            document.querySelectorAll('.cat-btn, .meal-btn-full').forEach(btn => btn.classList.remove('active'));
            document.getElementById('generateBtn').style.opacity = '0.5';
            document.getElementById('suggestions').innerHTML = '';
            renderEmptyState();
            currentRenderedCacheKey = '';
            return;
        }
        
        activeCategory = cat;
        document.querySelectorAll('.cat-btn, .meal-btn-full').forEach(btn => btn.classList.remove('active'));
        if(cat === 'Meals') document.getElementById('btn-cat-meals').classList.add('active');
        else document.getElementById(`btn-cat-${cat.toLowerCase()}`).classList.add('active');
        
        document.getElementById('generateBtn').style.opacity = '1';
        document.getElementById('suggestions').innerHTML = '';
        renderEmptyState();
        currentRenderedCacheKey = '';
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
        if (activeTab === 'cart') toggleMainView(); 
        if (!activeCategory) return;
        
        const cacheKey = `${activeSource}_${activeCategory}`;
        if (currentRenderedCacheKey !== cacheKey && deckCache[cacheKey] && deckCache[cacheKey].length > 0) {
            renderOutputDeck(deckCache[cacheKey]);
            currentRenderedCacheKey = cacheKey;
            return;
        }

        const pool = activeSource === 'cookbook' ? (state.savedMeals || []) : (state.globalMeals || []);
        let deck = [];

        if (activeCategory === 'Meals') {
            const valid = pool.filter(m => (m.diet || 'veg').toLowerCase() === appSettings.diet && !['dessert', 'drinks', 'cocktails'].includes((m.category || '').toLowerCase()));
            const b = valid.filter(m => (m.category || '').toLowerCase() === 'breakfast');
            const l = valid.filter(m => (m.category || '').toLowerCase() === 'lunch');
            const d = valid.filter(m => (m.category || '').toLowerCase() === 'dinner');
            
            if(b.length) deck.push(buildCard('Breakfast', b[Math.floor(Math.random()*b.length)], activeSource));
            if(l.length) deck.push(buildCard('Lunch', l[Math.floor(Math.random()*l.length)], activeSource));
            if(d.length) deck.push(buildCard('Dinner', d[Math.floor(Math.random()*d.length)], activeSource));
        } else {
            const valid = pool.filter(m => (m.category || '').toLowerCase() === activeCategory.toLowerCase() && ((m.diet || 'veg').toLowerCase() === appSettings.diet));
            if (valid.length > 0) deck.push(buildCard(activeCategory, valid[Math.floor(Math.random()*valid.length)], activeSource));
        }

        if(deck.length === 0) { 
            document.getElementById('suggestions').innerHTML = `<div class="empty"><h3>Empty Pool</h3><p class="subtle">No meals found for this selection.</p></div>`; 
            return; 
        }
        
        deckCache[cacheKey] = deck; 
        renderOutputDeck(deck);
        currentRenderedCacheKey = cacheKey;
    });

    function buildCard(time, mObj, source) { 
        return { 
            time: time, 
            name: mObj.name || '', 
            category: mObj.category || time, 
            diet: mObj.diet || 'veg', 
            ingredients: mObj.ingredients || '[]', 
            lastServed: mObj.lastServed || '', 
            source: source, 
            isLocked: false, 
            isQueued: false,
            poolContext: mObj.category || time
        }; 
    }

    function cookedWithinAWeek(lastServedStr) { 
        if(!lastServedStr) return false;
        return (Date.now() - new Date(lastServedStr).getTime()) < 7 * 24 * 60 * 60 * 1000;
    }

    function getCardInnerHTML(item, index) {

        document.getElementById('suggestions').innerHTML = `
            <div class="empty" style="padding: 5rem 1rem; border:none; background:transparent;">

    function renderOutputDeck(schema) {
      state.currentSuggestions = structuredClone(schema);
      const s = document.getElementById('suggestions'); 
      s.innerHTML = '';
      if (!schema.length) { 
          s.innerHTML = `<div class="empty"><h3>Empty Pool</h3><p class="subtle">No meals found for this selection.</p></div>`; 
          return; 
      }
      schema.forEach((item, index) => {
        const article = document.createElement('article');
        article.className = 'meal-card' + (item.isLocked ? ' locked' : '');
        article.id = `card-${index}`;
        article.innerHTML = getCardInnerHTML(item, index);
        s.appendChild(article);
      });
    }

    document.getElementById('suggestions').addEventListener('click', async event => {
      const btn = event.target.closest('[data-action]'); 
      if (!btn) return;
      
      const idx = Number(btn.dataset.index); 
      const action = btn.dataset.action; 
      const card = state.currentSuggestions[idx];
      
      if (action === 'prev-meal' || action === 'next-meal') {
          const pool = activeSource === 'cookbook' ? (state.savedMeals || []) : (state.globalMeals || []);
          let valid = [];
          
          if (activeCategory === 'Meals') {
              valid = pool.filter(m => (m.diet || 'veg').toLowerCase() === appSettings.diet && !['dessert', 'drinks', 'cocktails'].includes((m.category || '').toLowerCase()) && (m.category || '').toLowerCase() === card.time.toLowerCase());
          } else {
              valid = pool.filter(m => (m.category || '').toLowerCase() === activeCategory.toLowerCase() && ((m.diet || 'veg').toLowerCase() === appSettings.diet));
          }

          if (valid.length > 1) {
              let currentIdx = valid.findIndex(m => m.name === card.name);
              if (currentIdx === -1) currentIdx = 0;
              let newIdx = action === 'next-meal' ? (currentIdx + 1) % valid.length : (currentIdx - 1 + valid.length) % valid.length;
              let newMeal = valid[newIdx];
              
              state.currentSuggestions[idx] = buildCard(card.time, newMeal, activeSource);
              
              const article = document.getElementById(`card-${idx}`);
              article.className = 'meal-card';
              article.innerHTML = getCardInnerHTML(state.currentSuggestions[idx], idx);
              
              const cacheKey = `${activeSource}_${activeCategory}`;
              if (deckCache[cacheKey]) deckCache[cacheKey] = [...state.currentSuggestions];
          } else {
              showToast("No other meals in this category.");
          }
      }
      
      if (action === 'toggle-explore') document.getElementById(`explore-${idx}`).classList.toggle('open');
      
      if (action === 'queue-meal') {
          const bookmarkSvg = document.getElementById(`bookmark-${idx}`);
          if (card.isQueued) {
              card.isQueued = false; 
              pendingApprovals = pendingApprovals.filter(p => p.meal !== card.name);
              bookmarkSvg.setAttribute('fill', 'none'); 
              bookmarkSvg.setAttribute('stroke', 'currentColor');
          } else {
              card.isQueued = true; 
              pendingApprovals.push({ category: card.category || card.time, meal: card.name, diet: card.diet, ingredients: card.ingredients });
              bookmarkSvg.setAttribute('fill', 'var(--color-success)'); 
              bookmarkSvg.setAttribute('stroke', 'var(--color-success)');
          }
          renderReviewQueue(); 
          if(pendingApprovals.length > 0) {
              document.getElementById('openDataBtn').innerHTML = `<svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="var(--color-primary)" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
          } else {
              document.getElementById('openDataBtn').innerHTML = `<svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
          }
      }

      if (action === 'lock') { 
          card.isLocked = !card.isLocked;
          if (card.isLocked) { 
              card.lastServed = new Date().toISOString(); 
              runServer('logCooking', {mealName: card.name, sourceSheet: card.source}); 
          } else { 
              card.lastServed = ''; 
              runServer('removeCookingLog', {mealName: card.name, sourceSheet: card.source}); 
          }
          const article = document.getElementById('suggestions').children[idx];
          article.className = 'meal-card' + (card.isLocked ? ' locked' : ''); 
          article.innerHTML = getCardInnerHTML(card, idx);
          saveStateLocally();
      }
      
      if (action === 'add-to-cart') {
          if (card.ingredients && card.ingredients !== '[]') {
              try { 
                  pushToCartLocally(JSON.parse(card.ingredients), card.name); 
                  showToast('Added to Cart!'); 
                  return; 
              } catch(e) {}
          }
      }
      
      const searchQ = encodeURIComponent(card.name.trim() + ' ' + (card.time || '').trim() + ' recipe');
      if (action === 'share-card') { 
          window.open(`whatsapp://send?text=${encodeURIComponent(`🍽️ *${card.name.trim()}*\n\n🔍 _https://www.google.com/search?q=${searchQ}_\n\n▶️ _https://www.youtube.com/results?search_query=${searchQ}_`)}`, '_blank'); 
      }
      if (action === 'google') {
          window.open(`https://www.google.com/search?q=${searchQ}`, '_blank');
      }
      if (action === 'youtube') {
          window.open(`https://www.youtube.com/results?search_query=${searchQ}`, '_blank');
      }
      if (action === 'nutrition') {
          window.open(`https://www.google.com/search?q=${searchQ}+nutritional+info+calories+in+table+format`, '_blank');
      }
    });

    function shareDailyMenuToWhatsApp() {
        if (!state.currentSuggestions || !Array.isArray(state.currentSuggestions)) {
            showToast("Please generate a menu first."); 
            return;
        }
        const lockedCards = state.currentSuggestions.filter(card => card.isLocked);
        if (lockedCards.length === 0) {

    // ------------------------------------------------
    // CART LOGIC
    // ------------------------------------------------
    function pushToCartLocally(ingredientsList, mealContext) {
        ingredientsList.reverse().forEach(ing => {
          const safeIng = ing.toLowerCase().trim();
          let existing = state.grocery.find(i => i.name.toLowerCase() === safeIng);
          if (existing) {
              existing.inCart = true; 
              existing.checked = true; 
              existing.mealContext = mealContext;
          } else {
              state.grocery.unshift({ name: ing, count: 0, lastOrdered: '', category: 'Ghost', inCart: true, checked: true, mealContext: mealContext });
          }
        });
        renderCart(); 
        saveStateLocally(); 
        runServer('addRecipeToCart', {ingredients: ingredientsList, mealName: mealContext});
        if (activeTab !== 'cart') toggleMainView();
    }

    function shareCartToWhatsApp() {
        const checkedItems = state.grocery.filter(i => i.inCart && i.checked);
        if (!checkedItems.length) return;
        let text = "🛒 *Grocery List:*\n\n";
        checkedItems.forEach(i => text += `- ${i.name}\n`);
        window.open(`whatsapp://send?text=${encodeURIComponent(text.trim())}`, '_blank');
    }

    function removeMealGroup(mealContext) {
        const rawContext = mealContext.replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
        let hasChanges = false;
        state.grocery.forEach(i => {
            if (i.inCart && i.mealContext === rawContext) {
                i.inCart = false;
                i.checked = false;
                i.mealContext = '';
                hasChanges = true;
            }
        });
        state.grocery = state.grocery.filter(i => !(i.category === 'Ghost' && !i.inCart));
        if (hasChanges) {
            renderCart();
            saveStateLocally();
            runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)});
        }
    }

    function renderCart() {
      const container = document.getElementById('unified-cart-items');
      const activeCart = state.grocery.filter(item => item.inCart);
      
      if (activeCart.length === 0) { 
          container.innerHTML = '<p class="subtle" style="padding: 16px;">Cart is empty.</p>'; 
          return; 
      }

      const groups = {};
      activeCart.forEach(item => {
        let groupName = item.mealContext ? `For ${item.mealContext}` : 'Groceries';
        if (!groups[groupName]) groups[groupName] = [];
        groups[groupName].push(item);
      });

      let html = '';
      for (let group in groups) {
          if (group !== 'Groceries') {
              const mealContext = group.replace('For ', '');
              html += `<div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0 5px 8px;">
                          <div class="cart-group-title" style="margin:0;">${group}</div>
                          <button class="ghost-btn" style="color:var(--color-error); border:none; height:32px; width:32px; padding:0; font-weight:bold; font-size:1.5rem; display:flex; justify-content:center; align-items:center;" onclick="removeMealGroup('${escapeHtml(mealContext)}')">-</button>
                       </div>`;
          } else {
              html += `<div class="cart-group-title">${group}</div>`;
          }
          
          groups[group].forEach(item => {
              const isGhost = item.category === 'Ghost';
              const safeName = escapeHtml(item.name);
              
              html += `
              <div class="list-item-row ${item.checked ? 'checked' : 'dimmed'}" ontouchstart="touchStartGhost(event, '${safeName}', ${isGhost})" ontouchend="touchEndGhost(event)" ontouchmove="touchMoveGhost(event)">
                <div class="list-item-left" onclick="toggleCartItem('${safeName}')">
                    <div class="checkbox">${item.checked ? '✓' : ''}</div>
                    <div><div class="item-name">${safeName} ${isGhost ? '👻' : ''}</div></div>
                </div>
                <button class="trash-btn" onclick="executeSoftDelete('cart', '${safeName}')">
                    <svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
              </div>`;
          });
      }
      container.innerHTML = html;
    }

    function toggleCartItem(name) { 
        const rawName = name.replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
        const item = state.grocery.find(i => i.name.toLowerCase() === rawName.toLowerCase());
        
        if(item) {
            item.checked = !item.checked;
            renderCart(); 
            saveStateLocally(); 
            runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)});
        }
    }
    
    function clearActiveCart() { 
        let hasChanges = false;
        state.grocery.forEach(i => {
            if(i.inCart && i.checked) {
                i.inCart = false; 
                i.checked = false; 
                i.mealContext = ''; 
                hasChanges = true;
            }
        });
        
        state.grocery = state.grocery.filter(i => !(i.category === 'Ghost' && !i.inCart)); 
        
        if(hasChanges) { 
            renderCart(); 
            saveStateLocally(); 
            runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)}); 
        }
    }
    
    function addManualCartItem() { 
        const name = document.getElementById('manualCartAdd').value.trim(); 
        const category = document.getElementById('cartCategorySelect').value;
        if(name) { 
            let existing = state.grocery.find(i => i.name.toLowerCase() === name.toLowerCase());
            if(existing) {
                if(category && category !== '📦 Uncategorized') existing.category = category;
                existing.inCart = true; 
                existing.checked = true;
                existing.mealContext = '';

                state.grocery.unshift({name: name, count: 0, lastOrdered:'', category: category, inCart: true, checked: true, mealContext: ''}); 
            }
            document.getElementById('manualCartAdd').value = ''; 
            renderCart();

        } 
    }

    function getSortedCategories() {
        const catFreqs = {};
        state.grocery.forEach(item => { catFreqs[item.category] = (catFreqs[item.category] || 0) + (item.count || 1); });
        const fixedTop = ['All', '🔥 Top Picks']; const fixedBottom = ['📦 Uncategorized'];
        const dynamicCats = MASTER_CATEGORIES.filter(c => !fixedTop.includes(c.id) && !fixedBottom.includes(c.id));
        dynamicCats.sort((a, b) => (catFreqs[b.id] || 0) - (catFreqs[a.id] || 0));
        return [...MASTER_CATEGORIES.filter(c => fixedTop.includes(c.id)), ...dynamicCats, ...MASTER_CATEGORIES.filter(c => fixedBottom.includes(c.id))];
    }
    
    function populateCategoryDropdowns() {
        const sortedCats = getSortedCategories();
        const cartSelect = document.getElementById('cartCategorySelect');
        if (cartSelect) {
            cartSelect.innerHTML = `<option value="📦 Uncategorized">📦 Category</option>` + sortedCats.filter(c => !['All', '🔥 Top Picks', '📦 Uncategorized'].includes(c.id)).map(c => `<option value="${c.id}">${c.label}</option>`).join('');
        }
    }

    function renderCategoryRibbon() {
        document.getElementById('masterCategoryRibbon').innerHTML = getSortedCategories().map(cat => {
            return `<div class="filter-chip ${cat.id === '🔥 Top Picks' ? 'top-picks' : ''} ${activeMasterCategory === cat.id ? 'active' : ''}" onclick="setMasterCategory('${cat.id}')">${cat.label}</div>`;
        }).join('');
    }

    function setMasterCategory(catId) { 
        activeMasterCategory = catId; 
        renderCategoryRibbon(); 
        filterMasterList(); 
    }

    function filterMasterList() {
        const term = document.getElementById('masterSearchInput').value.trim();
        let filtered = state.grocery.filter(item => {
            if (item.category === 'Ghost') return false; 
            if (term && !fuzzyMatch(term, item.name)) return false;
            if (activeMasterCategory === 'All') return true;
            if (activeMasterCategory === '🔥 Top Picks') return item.count >= 5;
            return (item.category || '📦 Uncategorized') === activeMasterCategory;
        });

        filtered.sort((a, b) => (b.count - a.count) || a.name.localeCompare(b.name));
        const catOptions = getSortedCategories().filter(c => !['All', '🔥 Top Picks'].includes(c.id)).map(c => `<option value="${c.id}">${c.label}</option>`).join('');

        document.getElementById('ml-content').innerHTML = filtered.map(item => `
            <div class="list-item-row ${item.inCart ? 'checked' : ''}">
                <div class="list-item-left" onclick="toggleMasterItem('${escapeHtml(item.name)}')">
                    <div class="checkbox">${item.inCart ? '✓' : ''}</div>
                    <div>
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="item-flag" style="color:var(--color-text-muted);">🔄 Bought ${item.count}x · ${item.category}</div>
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap: 8px;">
                    <select onchange="editMasterItem('${escapeHtml(item.name)}', this.value)" style="background:var(--color-surface-2); color:var(--color-text); border:1px solid var(--color-border); border-radius:0.5rem; padding:6px; font-size:0.75rem; width: 44px; direction: rtl;">
                        <option value="" disabled selected>✏️</option>${catOptions}
                    </select>
                    <button class="trash-btn" onclick="executeSoftDelete('master', '${escapeHtml(item.name)}')">
                        <svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </div>`).join('') || '<p class="subtle" style="text-align:center; margin-top:20px;">No items match.</p>';
    }

    function toggleMasterItem(name) {
      const rawName = name.replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
      let item = state.grocery.find(i => i.name.toLowerCase() === rawName.toLowerCase());
      if(item) { 
          item.inCart = !item.inCart; 
          if(item.inCart) item.checked = true; 
      }
      filterMasterList(); 
      renderCart(); 
      saveStateLocally(); 
      runServer('syncCart', {cart: state.grocery.filter(i=>i.inCart)});
    }

    function editMasterItem(itemName, newCategory) {
        const rawName = itemName.replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
        const item = state.grocery.find(i => i.name.toLowerCase() === rawName.toLowerCase());
        if (item) {
            item.category = newCategory; 
            saveStateLocally(); 
            filterMasterList();
            runServer('editMasterItemCategory', { item: rawName, category: newCategory }); 
            showToast(`Category updated`);
        }
    }

    function openMasterList() { 
        document.getElementById('masterSearchInput').value = ''; 
        populateCategoryDropdowns(); 
        renderCategoryRibbon(); 
        filterMasterList(); 
        openModal('masterListModal'); 
    }
    
    function openCookbook() { 
        updateCookbookStats(); 
        openModal('dataModal'); 
    }
    
    function forceRefill() { 
        document.getElementById('refillBtn').innerHTML = `Syncing...`; 
        runServer('forceRefill', {}, false); 
        setTimeout(()=> document.getElementById('refillBtn').innerHTML=`⚡ Refill`, 2000); 
    }

    function updateCookbookStats() {
        try {
            const safeDiet = appSettings.diet || 'veg';
            const sm = state.savedMeals || [];
            const gm = state.globalMeals || [];
            
            document.getElementById('cb-mymeals').innerText = sm.filter(m => (m.diet || 'veg').toLowerCase() === safeDiet && ['breakfast','lunch','dinner'].includes((m.category || '').toLowerCase())).length;
            document.getElementById('cb-global').innerText = gm.filter(m => (m.diet || 'veg').toLowerCase() === safeDiet && ['breakfast','lunch','dinner'].includes((m.category || '').toLowerCase())).length;
            document.getElementById('cb-dessert').innerText = sm.filter(m=>(m.category||'').toLowerCase()==='dessert').length + gm.filter(m=>(m.category||'').toLowerCase()==='dessert').length;
            document.getElementById('cb-drinks').innerText = sm.filter(m=>(m.category||'').toLowerCase()==='drinks').length + gm.filter(m=>(m.category||'').toLowerCase()==='drinks').length;
            document.getElementById('cb-cocktails').innerText = sm.filter(m=>(m.category||'').toLowerCase()==='cocktails').length + gm.filter(m=>(m.category||'').toLowerCase()==='cocktails').length;
        } catch(e) { console.error(e); }
    }

    function filterCookbookSearch() {
        const activeBtn = document.querySelector('.stat-btn.active');
        if(activeBtn) renderCookbookList(activeBtn.dataset.cbcat, true);
    }

    function renderCookbookList(cat, isSearchUpdate = false) {
        const activeBtn = document.querySelector(`.stat-btn[data-cbcat="${cat}"]`);
        if (!isSearchUpdate) {
            if (activeBtn && activeBtn.classList.contains('active')) { 
                activeBtn.classList.remove('active'); 
                document.getElementById('cookbookOutput').innerHTML = ''; 
                document.getElementById('cookbookSearchInput').value = ''; 
                return; 
            }
            document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
            if(activeBtn) activeBtn.classList.add('active');
            document.getElementById('cookbookSearchInput').value = ''; 
        }

        const term = document.getElementById('cookbookSearchInput').value.trim();
        let items = [];
        const safeDiet = appSettings.diet || 'veg';
        const sm = state.savedMeals || [];
        const gm = state.globalMeals || [];

        if (cat === 'MyMeals') items = sm.filter(m => (m.diet || 'veg').toLowerCase() === safeDiet && ['breakfast','lunch','dinner'].includes((m.category || '').toLowerCase())).map(m=>({...m, src:'Local DB'}));
        else if (cat === 'Global') items = gm.filter(m => (m.diet || 'veg').toLowerCase() === safeDiet && ['breakfast','lunch','dinner'].includes((m.category || '').toLowerCase())).map(m=>({...m, src:'AI Pool'}));
        else items = [...sm.filter(m=>(m.category || '').toLowerCase()===cat.toLowerCase()).map(m=>({...m, src:'Local DB'})), ...gm.filter(m=>(m.category || '').toLowerCase()===cat.toLowerCase()).map(m=>({...m, src:'AI Pool'}))];

        if (term) items = items.filter(i => fuzzyMatch(term, i.name));
        items.sort((a, b) => a.name.localeCompare(b.name));

        let html = '';
        if(!items.length) { 
            html = '<p class="subtle" style="text-align:center; padding: 20px;">No items found in this category.</p>'; 
        } else { 
            const groups = {};
            items.forEach(i => {
                let c = i.category || 'Uncategorized';
                if(!groups[c]) groups[c] = [];
                groups[c].push(i);
            });
            for(let g in groups) {
                html += `<h5 style="color:var(--color-primary); margin: 16px 0 8px 4px; font-size: 0.85rem; text-transform:uppercase; letter-spacing:1px;">${g}</h5>`;
                groups[g].forEach(i => {
                    const safeName = escapeHtml(i.name);
                    html += `<div class="data-row" ontouchstart="touchStartMeal(event, '${safeName}', '${i.src}')" ontouchend="touchEndMeal(event)" ontouchmove="touchMoveMeal(event)"><span>${safeName}</span><span class="badge" style="font-size:0.65rem; background:transparent; border:1px solid var(--color-border); color:var(--color-text-muted);">${i.src}</span></div>`;
                });
            }
        }
        document.getElementById('cookbookOutput').innerHTML = html;
    }

    function setDietPref(pref) {
        appSettings.diet = pref;
        document.getElementById('toggleVeg').classList.toggle('active', pref === 'veg');
        document.getElementById('toggleNonVeg').classList.toggle('active', pref === 'non-veg');
        deckCache = {}; 
        
        document.getElementById('suggestions').innerHTML = '';
        renderEmptyState();
        currentRenderedCacheKey = '';
        
        saveStateLocally();
        updateCookbookStats();
        
        const activeBtn = document.querySelector('.stat-btn.active');
        if (activeBtn) renderCookbookList(activeBtn.dataset.cbcat);
    }

    function queueUnifiedEntry() {
        const m = document.getElementById('unified-meal-input').value.trim(); 
        const c = document.getElementById('unified-meal-category').value;
        if (m) { 
            pendingApprovals.push({ category: c, meal: m, diet: appSettings.diet, ingredients: '[]' }); 
            document.getElementById('unified-meal-input').value = ''; 
            renderReviewQueue(); 
        }
    }
    
    function renderReviewQueue() {
      const ql = document.getElementById('reviewQueueList'); 
      ql.innerHTML = '';
      const qp = document.getElementById('reviewQueuePanel');
      if (!pendingApprovals.length) { 
          qp.style.display = 'none'; 
          return; 
      }
      
      qp.style.display = 'block';
      pendingApprovals.forEach((item, idx) => {
        const li = document.createElement('li'); 
        li.className = 'review-queue-item';
        
        const itemCat = (item.category || '').toLowerCase();
        const catSelect = `
        <select onchange="pendingApprovals[${idx}].category = this.value">
            <option value="Breakfast" ${itemCat === 'breakfast' ? 'selected' : ''}>Breakfast</option>
            <option value="Lunch" ${itemCat === 'lunch' ? 'selected' : ''}>Lunch</option>
            <option value="Dinner" ${itemCat === 'dinner' ? 'selected' : ''}>Dinner</option>
            <option value="Dessert" ${itemCat === 'dessert' ? 'selected' : ''}>Dessert</option>
            <option value="Drinks" ${itemCat === 'drinks' ? 'selected' : ''}>Drinks</option>
            <option value="Cocktails" ${itemCat === 'cocktails' ? 'selected' : ''}>Cocktails</option>
        </select>`;

        li.innerHTML = `
        <div style="display:flex; align-items:center; gap:0.75rem; flex-grow:1;">
            <span style="font-weight:600; font-family:var(--font-display);">${escapeHtml(item.meal)}</span> 
            ${catSelect}
        </div>
        <button class="trash-btn" data-remove-queue="${idx}"><svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>`;
        ql.appendChild(li);
      });
    }
    
    document.addEventListener('click', e => { 
        const rmBtn = e.target.closest('[data-remove-queue]'); 
        if (rmBtn) { 
            const idx = Number(rmBtn.dataset.removeQueue); 
            const removedItem = pendingApprovals[idx];
            pendingApprovals.splice(idx, 1); 
            
            if (state.currentSuggestions && state.currentSuggestions.length > 0) {
                state.currentSuggestions.forEach((card, cardIdx) => {
                    if (card.name === removedItem.meal && card.isQueued) {
                        card.isQueued = false;
                        const bookmarkSvg = document.getElementById(`bookmark-${cardIdx}`);
                        if (bookmarkSvg) {
                            bookmarkSvg.setAttribute('fill', 'none');
                            bookmarkSvg.setAttribute('stroke', 'currentColor');
                        }
                    }
                });
            }

            renderReviewQueue(); 
            if (pendingApprovals.length === 0) {
                document.getElementById('openDataBtn').innerHTML = `<svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
            }
        } 
    });
    
    async function submitQueueForApproval() {
      if (!pendingApprovals.length) return;
      const btn = document.getElementById('submitApprovalBtn'); 
      btn.innerHTML = `Syncing...`;
      
      pendingApprovals.forEach(i => { 
          state.savedMeals.push({name: i.meal, category: i.category, diet: i.diet, lastServed: '', ingredients: i.ingredients}); 
      });
      runServer('sync_meals', { data: JSON.stringify(pendingApprovals) });
      
      pendingApprovals = []; 
      renderReviewQueue(); 
      updateCookbookStats(); 
      saveStateLocally();
      
      deckCache = {}; 
      
      document.getElementById('openDataBtn').innerHTML = `<svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
      
      btn.innerHTML = "✓ Synced"; 
      setTimeout(() => btn.innerHTML = "Push to Cloud", 2000);
    }

    let shoppingQueue = []; 
    let shoppingIndex = 0; 
    let activePlatform = 'swiggy';
    
    function startGuidedShopping(platform) {
      shoppingQueue = state.grocery.filter(i => i.inCart && i.checked); 
      if(!shoppingQueue.length) { 
          showToast("Please check at least one item to shop."); 
          return; 
      }
      activePlatform = platform; 
      shoppingIndex = 0; 
      updateGuidedUI(); 
      document.getElementById('guided-overlay').classList.add('active'); 
      window.location.href = activePlatform === 'swiggy' ? `swiggy://instamart/search?query=${encodeURIComponent(shoppingQueue[shoppingIndex].name)}` : `https://blinkit.com/s/?q=${encodeURIComponent(shoppingQueue[shoppingIndex].name)}`;
    }
    
    function updateGuidedUI() {
      document.getElementById('shopping-progress').innerText = `Item ${shoppingIndex + 1} of ${shoppingQueue.length} (${activePlatform.toUpperCase()})`;
      document.getElementById('shopping-item-name').innerText = escapeHtml(shoppingQueue[shoppingIndex].name);
    }
    
    function markFoundAndNext() {
      const current = shoppingQueue[shoppingIndex];
      let item = state.grocery.find(i => i.name === current.name);
      if(item) { 
          item.inCart = false; 
          item.checked = false; 
          item.count++; 
          item.mealContext=''; 
      }
      state.grocery = state.grocery.filter(i => !(i.category === 'Ghost' && !i.inCart)); 
      saveStateLocally();
      shoppingIndex++;
      
      if(shoppingIndex >= shoppingQueue.length) { 
          closeGuidedShopping(); 
          runServer('checkoutCart'); 
      } else { 
          updateGuidedUI(); 
          window.location.href = activePlatform === 'swiggy' ? `swiggy://instamart/search?query=${encodeURIComponent(shoppingQueue[shoppingIndex].name)}` : `https://blinkit.com/s/?q=${encodeURIComponent(shoppingQueue[shoppingIndex].name)}`; 
      }
    }
    
    function markNotFoundAndNext() {
      shoppingIndex++;
      if(shoppingIndex >= shoppingQueue.length) { 
          closeGuidedShopping(); 
      } else { 
          updateGuidedUI(); 
          window.location.href = activePlatform === 'swiggy' ? `swiggy://instamart/search?query=${encodeURIComponent(shoppingQueue[shoppingIndex].name)}` : `https://blinkit.com/s/?q=${encodeURIComponent(shoppingQueue[shoppingIndex].name)}`; 
      }
    }
    
    function closeGuidedShopping() { 
        document.getElementById('guided-overlay').classList.remove('active'); 
        renderCart(); 
    }

    function saveStateLocally() { 
        localStorage.setItem('mp_data_v15', JSON.stringify(state)); 
        localStorage.setItem('mp_settings', JSON.stringify(appSettings)); 
    }

    function init() {
      try {
          const cachedSettings = localStorage.getItem('mp_settings');
          if (cachedSettings) appSettings = JSON.parse(cachedSettings);
      } catch(e) {}
      
      setDietPref(appSettings.diet || 'veg');
      
      try {
          const cached = localStorage.getItem('mp_data_v15');
          if (cached) { 
              state = JSON.parse(cached); 
              if(!state.grocery) state.grocery = [];
              if(!state.savedMeals) state.savedMeals = [];
              if(!state.globalMeals) state.globalMeals = [];
              if(!state.currentSuggestions) state.currentSuggestions = [];
          } else {
              state = { grocery: [], savedMeals: [], globalMeals: [], currentSuggestions: [] };
          }
      } catch(e) {
          state = { grocery: [], savedMeals: [], globalMeals: [], currentSuggestions: [] };
      }
      
      populateCategoryDropdowns(); 
      renderCart(); 
      
      activeCategory = null;
      document.querySelectorAll('.cat-btn, .meal-btn-full').forEach(btn => btn.classList.remove('active'));
      document.getElementById('generateBtn').style.opacity = '0.5';
      document.getElementById('suggestions').innerHTML = '';
      renderEmptyState();
      
      if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.includes("PASTE")) return;
      
      document.getElementById('syncIndicator').classList.add('active'); 
      fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllData' }) })
        .then(res => res.json())
        .then(parsed => {
            if (parsed.success && parsed.data) {
                state.grocery = parsed.data.grocery || []; 
                state.savedMeals = parsed.data.savedMeals || []; 
                state.globalMeals = parsed.data.globalMeals || [];
                saveStateLocally(); 
                populateCategoryDropdowns(); 
                renderCart();
            }
            document.getElementById('syncIndicator').classList.remove('active');
        }).catch(e => { 
            document.getElementById('syncIndicator').classList.remove('active'); 
        });
    }

    init();
  </script>
</body>
</html>
