<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Meal Planner Pro</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  
  <style>
    :root, [data-theme="light"] {
      --color-bg: #ffffff; --color-surface: #f7f6f2; --color-surface-2: #f2f1ed; 
      --color-border: #e0deda; --color-divider: #e0deda; --color-text: #161514; --color-text-muted: #6b6965; 
      --color-primary: #01696f; --color-secondary: #e8af34; --color-success: #38661c; --color-warning: #c26502; --color-error: #8f266d;
      --font-body: 'General Sans', sans-serif; --font-display: 'Boska', serif;
      --shadow-md: 0 12px 32px rgba(0,0,0,0.1); 
      --ease-fluid: cubic-bezier(0.2, 0, 0, 1); 
    }
    [data-theme="dark"] {
      --color-bg: #000000; --color-surface: #121110; --color-surface-2: #1a1918; 
      --color-border: rgba(255, 255, 255, 0.05); --color-divider: rgba(255, 255, 255, 0.08); 
      --color-text: #e8e6e3; --color-text-muted: #918f8b; 
      --color-primary: #80c7d2; --color-secondary: #e6c57a; --color-success: #78a85d; --color-warning: #e39d5b; --color-error: #e57373;
      --shadow-md: 0 16px 40px rgba(0,0,0, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { min-height: 100dvh; font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); overflow-x: hidden; padding-bottom: 140px; }
    button, input, select { font: inherit; color: inherit; outline: none; background: none; border: none; cursor: pointer; }
    
    /* MODIFIED: Topbar is now relative, scrolling fluidly with the page */
    .topbar-wrapper { position: relative; width: 100%; max-width: 70rem; margin: 0 auto; padding: calc(1.5rem + env(safe-area-inset-top)) 1rem 1rem; z-index: 40; display: flex; flex-direction: column; gap: 10px; }
    .topbar-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-logo { width: 2.75rem; height: 2.75rem; border-radius: 1rem; display: grid; place-items: center; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: #000; font-weight: bold; }
    h1 { font-family: var(--font-display); font-size: 1.75rem; font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
    
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .icon-btn, .ghost-btn, .primary-btn, .accent-btn { border-radius: 2rem; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; transition: transform 0.2s var(--ease-fluid), background 0.2s var(--ease-fluid); padding: 0.75rem 1.5rem; }
    .icon-btn { width: 44px; padding: 0; border: 1px solid var(--color-border); background: var(--color-surface); height: 44px; }
    .ghost-btn { background: var(--color-surface); border: 1px solid var(--color-border); height: 44px; }
    .primary-btn { background: var(--color-primary); color: var(--color-bg); box-shadow: 0 4px 15px color-mix(in oklab, var(--color-primary) 30%, transparent); }
    .accent-btn { background: var(--color-secondary); color: var(--color-bg); }
    button:active { transform: scale(0.92); }

    /* MODIFIED: Adjusted shell padding since topbar is no longer fixed */
    .shell { max-width: 70rem; margin: 0 auto; padding: 1rem 1rem 8rem; }
    .page { display: none; animation: fadePeek 0.35s var(--ease-fluid); }
    .page.active { display: block; }
    @keyframes fadePeek { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .specialty-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; width: 100%; }
    .category-pill { flex: 1 1 calc(33.333% - 8px); padding: 14px 8px; border-radius: 1.25rem; border: 1px solid var(--color-border); background: var(--color-surface); font-weight: 600; font-size: 0.95rem; color: var(--color-text); cursor: pointer; transition: 0.2s var(--ease-fluid); display: flex; align-items: center; justify-content: center; gap: 6px; }
    .category-pill.active { background: var(--color-primary); border-color: var(--color-primary); color: var(--color-bg); transform: scale(1.02); }
    .category-pill:active { transform: scale(0.95); }

    .cards { display: grid; gap: 1.5rem; }
    .meal-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 2rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; animation: slideUpFade 0.35s var(--ease-fluid) backwards; position: relative; }
    .meal-card.locked { border-color: color-mix(in oklab, var(--color-success) 50%, transparent); box-shadow: 0 0 20px color-mix(in oklab, var(--color-success) 10%, transparent); }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-header-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .eyebrow { font-size: 0.8rem; text-transform: uppercase; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.1em; }
    .badge { padding: 4px 12px; border-radius: 2rem; font-size: 0.75rem; font-weight: 700; background: color-mix(in oklab, var(--color-success) 15%, transparent); color: var(--color-success); border: 1px solid color-mix(in oklab, var(--color-success) 20%, transparent); }
    .badge.tag-nonveg { background: color-mix(in oklab, var(--color-error) 15%, transparent); color: var(--color-error); border-color: color-mix(in oklab, var(--color-error) 20%, transparent); }
    .badge.tag-egg { background: color-mix(in oklab, var(--color-warning) 15%, transparent); color: var(--color-warning); border-color: color-mix(in oklab, var(--color-warning) 20%, transparent); }
    .badge.warning { background: color-mix(in oklab, var(--color-secondary) 15%, transparent); color: var(--color-secondary); border-color: color-mix(in oklab, var(--color-secondary) 20%, transparent); }
    
    .meal-title { font-family: var(--font-display); font-size: 2.1rem; line-height: 1.1; font-weight: 600; margin: 0.25rem 0; color: var(--color-text); }
    
    .top-actions { display: flex; gap: 8px; flex-direction: row; }
    .icon-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--color-surface-2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-border); cursor: pointer; transition: transform 0.2s var(--ease-fluid), background 0.2s; color: var(--color-text); }
    .icon-circle:active { transform: scale(0.85); }
    
    .card-action { min-height: 52px; font-weight: 600; border: 1px solid var(--color-border); border-radius: 1.25rem; background: var(--color-surface-2); color: var(--color-text); display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0.5rem 1rem; transition: transform 0.2s var(--ease-fluid), background 0.2s, border-color 0.2s; }
    .card-action.locked { background: var(--color-success); color: var(--color-bg); border-color: var(--color-success); }
    .card-action:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .explore-area { display: flex; justify-content: space-around; align-items: center; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s var(--ease-fluid), opacity 0.3s var(--ease-fluid), margin 0.3s var(--ease-fluid); margin-top: -10px; width: 100%; }
    .explore-area.open { max-height: 100px; opacity: 1; margin-top: 5px; padding: 12px 0; border-top: 1px solid var(--color-divider); }
    .explore-icon { width: 56px; height: 56px; border-radius: 1rem; background: var(--color-surface); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; transition: transform 0.2s var(--ease-fluid); flex-shrink: 0; color: var(--color-text); flex-direction: column; font-size: 0.65rem; font-weight: bold; gap: 4px; }
    .explore-icon svg { width: 20px; height: 20px; }
    .explore-icon:active { transform: scale(0.85); }
    
    .empty { padding: 3rem 2rem; background: var(--color-surface); border-radius: 2rem; border: 1px solid var(--color-border); color: var(--color-text-muted); text-align: center; width: 100%; }
    
    .bottom-nav { 
        position: fixed; 
        bottom: 24px; 
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: 400px; 
        display: flex; 
        gap: 8px; 
        padding: 8px; 
        background: color-mix(in oklab, var(--color-surface) 85%, transparent); 
        backdrop-filter: blur(24px); 
        border: 1px solid var(--color-border); 
        border-radius: 100px; 
        box-shadow: var(--shadow-md);
        z-index: 1000; 
        transition: transform 0.35s var(--ease-fluid), opacity 0.35s var(--ease-fluid); 
    }
    .bottom-nav.nav-hidden {
        transform: translate(-50%, 150%);
        opacity: 0;
        pointer-events: none;
    }
    .bottom-nav button { margin: 0; border-radius: 100px; }

    .cart-tools { display: flex; gap: 10px; margin-bottom: 20px; }
    .cart-tools input { flex: 1; padding: 14px 20px; border-radius: 1.5rem; border: 1px solid var(--color-border); background: var(--color-surface); font-size: 1rem; color: var(--color-text); transition: 0.2s; }
    .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-muted); font-weight: bold; margin: 24px 0 12px; }
    
    .cart-group-header { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--color-primary); margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--color-divider); }
    
    .list-item-row { display: flex; align-items: center; justify-content: space-between; background: var(--color-surface); padding: 16px; border-radius: 1.5rem; border: 1px solid var(--color-border); margin-bottom: 12px; transition: transform 0.2s var(--ease-fluid), opacity 0.3s; width: 100%; }
    .list-item-row:active { transform: scale(0.97); }
    .list-item-row.dimmed { opacity: 0.45; background: transparent; }
    .list-item-left { display: flex; align-items: center; gap: 16px; flex: 1; cursor: pointer; }
    .checkbox { width: 24px; height: 24px; border: 2px solid var(--color-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: transparent; transition: 0.2s var(--ease-fluid); flex-shrink: 0; font-weight: bold; }
    .list-item-row.checked .checkbox { background: var(--color-primary); color: var(--color-bg); }
    .item-name { font-size: 1.125rem; font-weight: 600; text-transform: capitalize; color: var(--color-text); }
    .item-flag { font-size: 0.75rem; color: var(--color-warning); font-weight: 600; margin-top: 4px; }
    .trash-btn { background: none; border: none; font-size: 1.25rem; color: var(--color-error); padding: 8px; border-radius: 50%; cursor: pointer; transition: transform 0.2s var(--ease-fluid); }
    .trash-btn:active { transform: scale(0.8); }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 2000; }
    .modal.open { display: flex; }
    .dialog { background: var(--color-surface); width: 100%; max-width: 520px; max-height: 85vh; border-radius: 2rem; border: 1px solid var(--color-border); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-md); animation: fadePeek 0.35s var(--ease-fluid); }
    .dialog-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
    .dialog-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    
    .sync-indicator { position: fixed; top: 10px; right: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: bold; color: var(--color-text-muted); background: var(--color-surface-2); padding: 6px 12px; border-radius: 2rem; opacity: 0; transition: 0.3s; z-index: 9999; }
    .sync-indicator.active { opacity: 1; }
    .sync-spinner { width: 12px; height: 12px; border: 2px solid var(--color-text-muted); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .review-queue-list { list-style: none; display: grid; gap: 10px; margin: 0; padding: 0; }
    .review-queue-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--color-surface-2); border-radius: 1rem; justify-content: space-between; }
    .review-queue-item select { padding: 6px; border-radius: 8px; background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); font-family: var(--font-body); font-weight: bold; height: 36px; }
    
    .guided-overlay { position: fixed; inset: 0; background: var(--color-bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s var(--ease-fluid); padding: 24px; text-align: center; }
    .guided-overlay.active { opacity: 1; pointer-events: auto; }
    .shopping-progress { color: var(--color-text-muted); font-size: 16px; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .shopping-item-name { font-size: 36px; font-weight: bold; margin-bottom: 48px; color: var(--color-text); text-transform: capitalize; font-family: var(--font-display); }
    .close-shopping { position: absolute; top: 40px; right: 24px; font-size: 24px; color: var(--color-text-muted); background: none; border: none; cursor: pointer; transition: transform 0.2s var(--ease-fluid); }
    .close-shopping:active { transform: scale(0.8); }
    .data-row { display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; padding: 1rem 1.5rem; border: 1px solid var(--color-border); border-radius: 1.25rem; background: var(--color-surface); font-size: 1rem; margin-bottom: 8px; width: 100%; transition: transform 0.2s var(--ease-fluid); }
    .data-row:active { transform: scale(0.98); }
    
    /* Utility class for the hidden topbar */
    .topbar-hidden { display: none !important; }
  </style>
</head>
<body>
  
  <div class="sync-indicator" id="syncIndicator"><div class="sync-spinner"></div> System Sync...</div>

  <div class="topbar-wrapper" id="mainTopbar">
    <div class="topbar-main">
      <div class="brand"><div class="brand-logo">MP</div><h1>Meal Planner</h1></div>
      
      <div class="header-actions" id="topbar-plan-actions">
        <button class="icon-btn" data-theme-toggle></button>
        <button class="ghost-btn" id="openDataBtn" onclick="openCookbook()">
            <svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="shell">
    <main id="main">
      <div id="page-plan" class="page active">
        <section class="hero">
          <div class="specialty-bar" id="specialtyBar">
              <button class="category-pill" data-cat="MyMeals">👤 My Meals</button>
              <button class="category-pill" data-cat="Global">🧑‍🍳 Global</button>
              <button class="category-pill" data-cat="Dessert">🍰 Dessert</button>
              <button class="category-pill" data-cat="Drinks">🥤 Drinks</button>
              <button class="category-pill" data-cat="Cocktails">🥂 Cocktails</button>
          </div>
        </section>
        <section class="section"><div id="suggestions" class="cards" aria-live="polite"></div></section>
      </div>

      <div id="page-cart" class="page">
        <!-- MODIFIED: Added padding-top to compensate for the removed topbar, and moved the Undo button here -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; padding-top: calc(1rem + env(safe-area-inset-top));">
          <h2 style="font-family:var(--font-display); font-size:2rem; font-weight:600;">Grocery Cart</h2>
          <div style="display:flex; gap:8px; align-items: center;">
            <button class="ghost-btn" id="undoBtn" style="opacity: 0.3; pointer-events: none; padding: 0 12px; border:none; background:transparent; color:var(--color-primary); font-size: 0.95rem; font-weight: 700;" onclick="undoDelete()">⟲ Undo</button>
            <button class="icon-btn" onclick="shareCartToWhatsApp()">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="20" height="20"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
            </button>
            <button class="ghost-btn" style="border-radius: 2rem; padding: 8px 16px;" onclick="openMasterList()">List ▾</button>
          </div>
        </div>
        
        <div class="cart-tools"><input id="manualCartAdd" placeholder="Add custom item..."><button class="primary-btn" style="border-radius: 1.5rem; padding: 0 20px; height: 48px;" onclick="addManualCartItem()">+</button></div>
        
        <div style="display:flex; justify-content:flex-end; margin-bottom: 12px;">
            <button class="ghost-btn" style="border-radius: 1.5rem; padding: 6px 12px; font-size: 12px; height: 32px;" onclick="clearActiveCart()">🗑️ Clear Active</button>
        </div>
        
        <div id="unified-cart-items"></div>
        
        <div style="display:flex; gap:10px; margin-top:30px; margin-bottom:24px;">
            <button class="primary-btn" style="flex: 1; background: #fc8019;" onclick="startGuidedShopping('swiggy')">🛒 Swiggy</button>
            <button class="primary-btn" style="flex: 1; background: #f8cb46; color: #000;" onclick="startGuidedShopping('blinkit')">🛒 Blinkit</button>
        </div>
      </div>
    </main>
  </div>

  <div class="bottom-nav" id="bottomNav">
      <button class="ghost-btn" id="navToggleBtn" onclick="toggleMainView()" style="flex: 1; height: 56px; font-size: 1.1rem; justify-content: center; background: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text);">🛒 Cart</button>
      <button class="primary-btn" id="generateBtn" style="flex: 2.5; height: 56px; font-size: 1.2rem; justify-content: center; opacity: 0.5; transition: 0.3s var(--ease-fluid);">🎲 Generate</button>
  </div>

  <div class="guided-overlay" id="guided-overlay">
    <button class="close-shopping" onclick="closeGuidedShopping()">✕</button>
    <div class="shopping-progress" id="shopping-progress">Item 1 of X</div>
    <div class="shopping-item-name" id="shopping-item-name">Item Name</div>
    <div style="display:flex; flex-direction:column; gap:10px; width: 100%; max-width: 350px;">
        <button class="primary-btn" style="background:var(--color-success); border-radius: 1.5rem; padding: 18px;" onclick="markFoundAndNext()">✓ Found (Next)</button>
        <button class="ghost-btn" style="border-radius: 1.5rem; padding: 18px; border-color: var(--color-error); color: var(--color-error);" onclick="markNotFoundAndNext()">✕ Not Found (Keep in list)</button>
    </div>
  </div>

  <div class="modal" id="masterListModal">
    <section class="dialog">
      <div class="dialog-head"><h4 style="font-family: var(--font-display); font-size: 1.5rem;">Master Groceries</h4><button class="icon-btn" style="border-radius: 50%;" onclick="closeModal('masterListModal')"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
      <div class="dialog-body">
        <div style="display:flex; gap:8px;"><input id="newMasterInput" class="ghost-btn" style="flex:1; padding: 12px; border-radius: 1.5rem; text-align: left;" placeholder="New item..."><button class="primary-btn" style="border-radius:1.5rem; padding:0 20px;" onclick="addManualMasterItem()">+</button></div>
        <div id="ml-content"></div>
      </div>
    </section>
  </div>

  <div class="modal" id="dataModal">
    <section class="dialog">
      <div class="dialog-head"><h4 style="font-family: var(--font-display); font-size: 1.5rem;">Core Database</h4><button class="icon-btn" style="border-radius: 50%;" onclick="closeModal('dataModal')"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
      <div class="dialog-body" id="cookBookScrollArea">
          
        <button class="primary-btn" style="width: 100%; border-radius: 1.5rem; padding: 16px; margin-bottom: 24px; font-size: 1.1rem;" onclick="forceRefill()" id="refillBtn">⚡ Refill</button>
          
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px;">
            <button class="ghost-btn" style="height:auto; padding:16px; flex-direction:column; border-radius:1.5rem;" onclick="renderCookbookList('MyMeals')"><span style="font-size:1.5rem; margin-bottom:4px;" id="cb-mymeals">0</span><span style="font-size:0.8rem; color:var(--color-text-muted);">👤 My Meals</span></button>
            <button class="ghost-btn" style="height:auto; padding:16px; flex-direction:column; border-radius:1.5rem;" onclick="renderCookbookList('Global')"><span style="font-size:1.5rem; margin-bottom:4px;" id="cb-global">0</span><span style="font-size:0.8rem; color:var(--color-text-muted);">🧑‍🍳 Global</span></button>
            <button class="ghost-btn" style="height:auto; padding:16px; flex-direction:column; border-radius:1.5rem;" onclick="renderCookbookList('Dessert')"><span style="font-size:1.5rem; margin-bottom:4px;" id="cb-dessert">0</span><span style="font-size:0.8rem; color:var(--color-text-muted);">🍰 Dessert</span></button>
            <button class="ghost-btn" style="height:auto; padding:16px; flex-direction:column; border-radius:1.5rem;" onclick="renderCookbookList('Drinks')"><span style="font-size:1.5rem; margin-bottom:4px;" id="cb-drinks">0</span><span style="font-size:0.8rem; color:var(--color-text-muted);">🥤 Drinks</span></button>
            <button class="ghost-btn" style="height:auto; padding:16px; flex-direction:column; border-radius:1.5rem; grid-column: span 2;" onclick="renderCookbookList('Cocktails')"><span style="font-size:1.5rem; margin-bottom:4px;" id="cb-cocktails">0</span><span style="font-size:0.8rem; color:var(--color-text-muted);">🥂 Cocktails</span></button>
        </div>

        <section id="dashboardView">
            <div style="background: var(--color-surface-2); padding: 1.5rem; border-radius: 2rem; border: 1px solid var(--color-border); margin-bottom: 20px;">
                <h5 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: .12em; color: var(--color-primary); margin-bottom: 1.25rem;">Add Manual Entry</h5>
                <div style="display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; width: 100%;">
                    <input class="ghost-btn" style="flex: 1; min-width: 0; text-align: left; border-radius: 1.25rem; padding: 14px 16px;" id="unified-meal-input" placeholder="Type meal name...">
                    <select style="flex: 0 0 auto; min-width: 110px; border-radius: 1.25rem; padding: 0 12px; height: 48px; font-family: var(--font-body); font-size: 16px; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); -webkit-appearance: none; appearance: none; outline: none;" id="unified-meal-category">
                        <option value="Breakfast">Breakfast</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option>
                        <option value="Dessert">Dessert</option><option value="Drinks">Drinks</option><option value="Cocktails">Cocktails</option>
                    </select>
                    <button class="primary-btn" style="flex-shrink: 0; border-radius: 1.25rem; padding: 0 20px; height: 48px;" onclick="queueUnifiedEntry()">+</button>
                </div>
            </div>
            <div id="reviewQueuePanel" style="display:none; padding:15px; background:var(--color-surface-2); border-radius:1.5rem; border:1px solid var(--color-success); margin-bottom: 20px;">
               <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><h5 style="color:var(--color-success); font-weight:bold;">Pending Sync</h5><button onclick="submitQueueForApproval()" id="submitApprovalBtn" style="color:var(--color-success); font-weight:bold; background:none; border:none; cursor:pointer;">Push to Cloud</button></div>
               <ul class="review-queue-list" id="reviewQueueList"></ul>
            </div>
            
            <div id="cookbookOutput"></div>
        </section>
      </div>
    </section>
  </div>

  <script>
    const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzNOXoxn17I3d4-inuxiEqhdPxOQokGlSGCYW8buwLTcO6YJxbvcHBH0dZ1d-fBDzwl/exec"; 

    let state = { 
        db: { breakfast: [], lunch: [], dinner: [], dessert: [], drinks: [], cocktails: [] }, 
        aiDiscoveryPool: [], 
        cookingHistory: [], currentSuggestions: [], masterGrocery: [], orderHistory: [], cart: [] 
    };
    
    let pendingApprovals = [];
    let graveyard = [];
    let activeTab = 'plan';

    let lastScrollY = window.scrollY;
    const bottomNav = document.getElementById('bottomNav');
    window.addEventListener('scroll', () => {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 60) {
            bottomNav.classList.add('nav-hidden');
        } else {
            bottomNav.classList.remove('nav-hidden');
        }
        lastScrollY = currentScrollY;
    }, { passive: true });

    function escapeHtml(str) { return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    function openModal(modalId) { document.getElementById(modalId).classList.add('open'); }
    function closeModal(modalId) { document.getElementById(modalId).classList.remove('open'); }

    (() => {
      const themeBtn = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      const renderThemeIcon = () => { themeBtn.innerHTML = theme === 'dark' ? '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>' : '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'; };
      renderThemeIcon();
      themeBtn.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; root.setAttribute('data-theme', theme); renderThemeIcon(); });
    })();

    function updateUndoButton() {
        const btn = document.getElementById('undoBtn');
        if (graveyard.length > 0) {
            btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; btn.innerHTML = `⟲ Undo (${graveyard.length})`;
        } else {
            btn.style.opacity = '0.3'; btn.style.pointerEvents = 'none'; btn.innerHTML = `⟲ Undo`;
        }
    }

    function executeSoftDelete(context, key) {
        if(navigator.vibrate) navigator.vibrate(15);
        if (context === 'cart') {
            const idx = Number(key);
            const deletedItem = state.cart.splice(idx, 1)[0];
            graveyard.push({ context: 'cart', item: deletedItem, originalIndex: idx });
            renderCart(); saveStateLocally(); updateUndoButton();
        } else if (context === 'master') {
            const idx = state.masterGrocery.findIndex(i => i.name === key);
            if (idx > -1) {
                const deletedItem = state.masterGrocery.splice(idx, 1)[0];
                graveyard.push({ context: 'master', item: deletedItem, originalIndex: idx });
                openMasterList(); saveStateLocally(); updateUndoButton();
            }
        }
    }

    function undoDelete() {
        if (!graveyard.length) return;
        const lastDeleted = graveyard.pop();
        if (lastDeleted.context === 'cart') { state.cart.splice(lastDeleted.originalIndex, 0, lastDeleted.item); renderCart(); } 
        else if (lastDeleted.context === 'master') { state.masterGrocery.splice(lastDeleted.originalIndex, 0, lastDeleted.item); openMasterList(); }
        saveStateLocally(); updateUndoButton();
    }

    function flushGraveyardCache() {
        if (!graveyard.length) return;
        graveyard.forEach(cached => {
            if (cached.context === 'master') fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteMasterItem', item: cached.item.name }) }).catch(e=>e);
        });
        syncCartToBackend(); graveyard = []; updateUndoButton();
    }

    window.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushGraveyardCache(); });
    window.addEventListener("pagehide", flushGraveyardCache);

    function getMealTag(name) {
      const low = String(name || '').toLowerCase();
      const nonVegRegex = /\b(chicken|fish|mutton|meat|prawn|beef|pork|bacon|prosciutto|salmon|tuna|lamb|shrimp|crab|turkey|ham|duck|gosht|murgh|machli|sausage)\b/i;
      const eggRegex = /\b(egg|eggs|omelet|omelette|frittata|shakshuka|anda|bhurji)\b/i;
      
      if (nonVegRegex.test(low)) return { text: 'Non-Veg', cls: 'tag-nonveg' };
      if (eggRegex.test(low)) return { text: 'Egg', cls: 'tag-egg' };
      return { text: 'Veg', cls: 'tag-veg' };
    }

    function cookedWithinAWeek(mealName) { 
        const now = Date.now(); 
        return state.cookingHistory.some(e => {
            if(e.name.toLowerCase().trim() !== mealName.toLowerCase().trim()) return false;
            return (now - new Date(e.date).getTime()) < 7 * 24 * 60 * 60 * 1000;
        }); 
    }

    function buildCard(time, name, source, poolContext = null, extra = {}) { 
        return { 
            time, name, source, poolContext, 
            isLocked: !!extra.isLocked, cookedRecently: !!cookedWithinAWeek(name), 
            history: extra.history || [name], historyIndex: extra.historyIndex || 0,
            isQueued: false 
        }; 
    }

    function getCardInnerHTML(item, index) {
      const tag = getMealTag(item.name);
      
      const cartHtml = item.source !== 'db' ? `<div class="icon-circle" data-action="add-to-cart" data-index="${index}"><svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></div>` : '';
      
      const bookmarkColor = item.isQueued ? 'var(--color-success)' : 'none';
      const bookmarkStroke = item.isQueued ? 'var(--color-success)' : 'currentColor';
      const bookmarkHtml = item.source !== 'db' ? `<div class="icon-circle" data-action="queue-meal" data-index="${index}"><svg id="bookmark-${index}" style="pointer-events:none; transition: 0.3s var(--ease-fluid);" width="20" height="20" viewBox="0 0 24 24" fill="${bookmarkColor}" stroke="${bookmarkStroke}" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></div>` : '';

      return `
        <div class="card-header-row">
            <div class="card-header-left">
                <span class="eyebrow">${item.time}</span>
                <span class="badge ${tag.cls}">${tag.text}</span>
                ${item.cookedRecently ? '<span class="badge warning">Cooked recently</span>' : ''}
            </div>
            <div class="top-actions">
                ${cartHtml}
                ${bookmarkHtml}
            </div>
        </div>
        
        <div class="meal-title">${escapeHtml(item.name)}</div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <button class="card-action" data-action="prev" data-index="${index}" ${item.historyIndex > 0 && !item.isLocked ? '' : 'disabled'}><svg style="pointer-events:none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="11 17 6 12 11 7"></polyline><polyline points="18 17 13 12 18 7"></polyline></svg></button>
            <button class="card-action" data-action="next" data-index="${index}" ${item.isLocked ? 'disabled' : ''}><svg style="pointer-events:none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg></button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="card-action ${item.isLocked ? 'locked' : ''}" data-action="lock" data-index="${index}">${item.isLocked ? '✓ On Menu' : 'Serve It'}</button>
            <button class="card-action" data-action="toggle-explore" data-index="${index}">⋮ More</button>
        </div>
        
        <div id="explore-${index}" class="explore-area">
          <button class="explore-icon" data-action="google" data-index="${index}"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 24c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 21.53 7.7 24 12 24z"/><path fill="#FBBC05" d="M5.84 15.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V8.06H2.18C1.43 9.55 1 11.22 1 13s.43 3.45 1.18 4.94l3.66-2.84z"/><path fill="#EA4335" d="M12 4.84c1.61 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.63 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.06l3.66 2.84c.87-2.6 3.3-4.06 6.16-4.06z"/></svg>Recipe</button>
          <button class="explore-icon" data-action="youtube" data-index="${index}"><svg viewBox="0 0 24 24"><path fill="#FF0000" d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>Video</button>
          <button class="explore-icon" data-action="nutrition" data-index="${index}"><svg fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>Stats</button>
          <button class="explore-icon" data-action="share-card" data-index="${index}"><svg fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>Share</button>
        </div>
      `;
    }

    function renderEmptyState() {
        document.getElementById('suggestions').innerHTML = `
            <div class="empty" style="padding: 5rem 1rem; border:none; background:transparent;">
                <h3 style="font-size: 2.5rem; margin-bottom: 1rem; line-height:1.2;">✨<br>Awaken Your Palate</h3>
                <p class="subtle" style="font-size: 1.1rem; line-height: 1.5; color: var(--color-text-muted);">Select a culinary path from the filters above to begin.</p>
            </div>`;
        document.getElementById('generateBtn').style.opacity = '0.5';
    }

    function renderOutputDeck(schema) {
      state.currentSuggestions = structuredClone(schema);
      const s = document.getElementById('suggestions'); s.innerHTML = '';
      if (!schema.length) { s.innerHTML = `<div class="empty"><h3>Empty Pool</h3><p class="subtle">No meals found for this selection.</p></div>`; return; }
      schema.forEach((item, index) => {
        const article = document.createElement('article');
        article.className = 'meal-card' + (item.isLocked ? ' locked' : '');
        article.id = `card-${index}`;
        article.innerHTML = getCardInnerHTML(item, index);
        s.appendChild(article);
      });
    }

    document.getElementById('specialtyBar').addEventListener('click', (e) => {
        const btn = e.target.closest('.category-pill'); if (!btn) return;
        
        if (btn.classList.contains('active')) {
            btn.classList.remove('active'); 
            document.getElementById('generateBtn').style.opacity = '0.5';
        } else {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); 
            document.getElementById('generateBtn').style.opacity = '1';
        }
    });

    document.getElementById('generateBtn').addEventListener('click', () => {
        const activePill = document.querySelector('.category-pill.active');
        if (!activePill) return; 

        if (activeTab === 'cart') toggleMainView(); 

        const cat = activePill.dataset.cat;
        const deck = [];

        if (cat === 'MyMeals') {
            const bPool = state.db.breakfast || []; const lPool = state.db.lunch || []; const dPool = state.db.dinner || [];
            const m1 = pickUniqueMeal(bPool, []); const m2 = pickUniqueMeal(lPool, []); const m3 = pickUniqueMeal(dPool, []);
            if(m1) deck.push(buildCard('Breakfast', m1, 'db', 'breakfast'));
            if(m2) deck.push(buildCard('Lunch', m2, 'db', 'lunch'));
            if(m3) deck.push(buildCard('Dinner', m3, 'db', 'dinner'));
        } else if (cat === 'Global') {
            const bPool = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === 'breakfast');
            const lPool = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === 'lunch');
            const dPool = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === 'dinner');
            
            if(bPool.length) { const m = bPool[Math.floor(Math.random()*bPool.length)]; deck.push(buildCard('Breakfast', m.name, 'api', 'breakfast')); }
            if(lPool.length) { const m = lPool[Math.floor(Math.random()*lPool.length)]; deck.push(buildCard('Lunch', m.name, 'api', 'lunch')); }
            if(dPool.length) { const m = dPool[Math.floor(Math.random()*dPool.length)]; deck.push(buildCard('Dinner', m.name, 'api', 'dinner')); }
        } else {
            const pool = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === cat.toLowerCase());
            if(pool.length > 0) {
                const m = pool[Math.floor(Math.random() * pool.length)];
                deck.push(buildCard(cat, m.name, 'api', cat.toLowerCase()));
            } else {
                const lPool = state.db[cat.toLowerCase()] || []; const lm = pickUniqueMeal(lPool, []);
                if(lm) deck.push(buildCard(cat, lm, 'db', cat.toLowerCase()));
            }
        }
        
        renderOutputDeck(deck);
    });

    function pickUniqueMeal(pool, excludedNames = []) {
      const uniquePool = pool.filter(m => !excludedNames.includes(m));
      if (uniquePool.length === 0) return null;
      return uniquePool[Math.floor(Math.random() * uniquePool.length)];
    }

    document.getElementById('suggestions').addEventListener('click', async event => {
      const btn = event.target.closest('[data-action]'); if (!btn) return;
      const idx = Number(btn.dataset.index); const action = btn.dataset.action; const card = state.currentSuggestions[idx];
      
      if (action === 'toggle-explore') document.getElementById(`explore-${idx}`).classList.toggle('open');
      
      if (action === 'queue-meal') {
          const catMap = { 'Breakfast': 'Breakfast', 'Lunch': 'Lunch', 'Dinner': 'Dinner', 'Dessert': 'Dessert', 'Drinks': 'Drinks', 'Cocktails': 'Cocktails' };
          const defaultCat = catMap[card.time] || 'Dinner';
          const bookmarkSvg = document.getElementById(`bookmark-${idx}`);
          
          if (card.isQueued) {
              card.isQueued = false;
              pendingApprovals = pendingApprovals.filter(p => p.meal !== card.name);
              bookmarkSvg.setAttribute('fill', 'none');
              bookmarkSvg.setAttribute('stroke', 'currentColor');
          } else {
              card.isQueued = true;
              pendingApprovals.push({ category: defaultCat, meal: card.name });
              bookmarkSvg.setAttribute('fill', 'var(--color-success)');
              bookmarkSvg.setAttribute('stroke', 'var(--color-success)');
          }
          renderReviewQueue(); 
          document.getElementById('openDataBtn').innerHTML = `<svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="var(--color-primary)" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
      }

      if (action === 'prev') {
          if (card.historyIndex > 0) {
              card.historyIndex--;
              card.name = card.history[card.historyIndex];
              card.cookedRecently = !!cookedWithinAWeek(card.name); 
              const article = document.getElementById('suggestions').children[idx];
              article.innerHTML = getCardInnerHTML(card, idx);
          }
      }
      
      if (action === 'next') {
          if (card.historyIndex < card.history.length - 1) {
              card.historyIndex++;
              card.name = card.history[card.historyIndex];
          } else {
              let newMeal = null;
              if (card.source === 'api') {
                  const pool = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === card.poolContext.toLowerCase());
                  if(pool.length > 0) newMeal = pool[Math.floor(Math.random() * pool.length)];
              } else {
                  const pool = state.db[card.poolContext] || [];
                  const nm = pickUniqueMeal(pool, card.history);
                  if(nm) newMeal = { name: nm };
              }

              if (newMeal) { 
                  card.history.push(newMeal.name); card.historyIndex++; 
                  card.name = newMeal.name; 
              } else { return; }
          }
          card.cookedRecently = !!cookedWithinAWeek(card.name);
          const article = document.getElementById('suggestions').children[idx];
          article.innerHTML = getCardInnerHTML(card, idx);
      }

      if (action === 'lock') { 
          card.isLocked = !card.isLocked;
          if (card.isLocked) { 
              state.cookingHistory.push({ name: card.name, date: new Date().toISOString() }); saveStateLocally();
              fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'logCooking', mealName: card.name }) }); 
          } else { 
              state.cookingHistory = state.cookingHistory.filter(e => e.name.toLowerCase() !== card.name.toLowerCase()); saveStateLocally();
              fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'removeCookingLog', mealName: card.name }) }); 
          }
          card.cookedRecently = !!cookedWithinAWeek(card.name);
          const article = document.getElementById('suggestions').children[idx];
          article.className = 'meal-card' + (card.isLocked ? ' locked' : ''); 
          article.innerHTML = getCardInnerHTML(card, idx);
      }
      
      if (action === 'add-to-cart') {
          const targetName = card.name.toLowerCase().trim();
          const aiMeal = state.aiDiscoveryPool.find(m => m.name.toLowerCase().trim() === targetName);
          if (aiMeal && aiMeal.ingredients && aiMeal.ingredients !== '[]') {
              try { pushToCartLocally(JSON.parse(aiMeal.ingredients), card.name); return; } catch(e) {}
          }
      }
      
      const searchQ = encodeURIComponent(card.name.trim() + ' ' + (card.time || '').trim() + ' recipe');
      const gUrl = `https://www.google.com/search?q=${searchQ}`;
      const yUrl = `https://www.youtube.com/results?search_query=${searchQ}`;

      if (action === 'share-card') {
          const text = `🍽️ *${card.name.trim()}*\n\n🔍 *Recipe Search:* _${gUrl}_\n\n📺 *Video Search:* _${yUrl}_`;
          window.open(`whatsapp://send?text=${encodeURIComponent(text)}`, '_blank');
      }
      if (action === 'google') window.open(gUrl, '_blank');
      if (action === 'youtube') window.open(yUrl, '_blank');
      if (action === 'nutrition') window.open(`https://www.google.com/search?q=${searchQ}+nutritional+factual+information+calories`, '_blank');
    });

    function pushToCartLocally(ingredients, mealContext = "Uncategorized") {
        const now = new Date();
        const recentNames = state.orderHistory
            .filter(h => (now - new Date(h.date)) < 14*24*60*60*1000)
            .map(h => h.item.toLowerCase().trim());
            
        ingredients.reverse().forEach(ing => {
          const safeIng = ing.toLowerCase().trim();
          const isRecent = recentNames.includes(safeIng);
          
          if(!state.cart.some(c => c.name.toLowerCase().trim() === safeIng && c.mealContext === mealContext)) {
            state.cart.unshift({ 
                name: ing, 
                checked: !isRecent, 
                recent: isRecent, 
                flag: isRecent ? "Recently Bought" : "", 
                mealContext: mealContext 
            });
          }
        });
        
        renderCart(); saveStateLocally(); syncCartToBackend();
        
        if (activeTab !== 'cart') toggleMainView();
    }

    function shareCartToWhatsApp() {
        const groups = {};
        state.cart.filter(i => i.checked).forEach(item => {
           const ctx = item.mealContext || "Uncategorized";
           if (!groups[ctx]) groups[ctx] = [];
           groups[ctx].push(item.name);
        });
        
        if (Object.keys(groups).length === 0) return;
        
        let text = "🛒 *Grocery List:*\n\n";
        for (const [ctx, items] of Object.entries(groups)) {
            if (ctx !== 'Uncategorized') text += `*For ${ctx}:*\n`;
            else text += `*General:*\n`;
            items.forEach(i => text += `- ${i}\n`);
            text += `\n`;
        }
        
        window.open(`whatsapp://send?text=${encodeURIComponent(text.trim())}`, '_blank');
    }

    function renderCart() {
      const groups = {};
      state.cart.forEach((item, index) => {
         const ctx = item.mealContext || "Uncategorized";
         if (!groups[ctx]) groups[ctx] = [];
         groups[ctx].push({ ...item, originalIndex: index });
      });

      let html = '';
      if (state.cart.length === 0) { html = '<p class="subtle">Cart is empty.</p>'; }

      for (const [ctx, items] of Object.entries(groups)) {
         if(ctx !== "Uncategorized") html += `<div class="cart-group-header">🛒 For ${escapeHtml(ctx)}</div>`;
         else html += `<div class="cart-group-header">🛒 General Master List</div>`;
         
         items.forEach(item => {
             html += `
              <div class="list-item-row ${item.checked ? 'checked' : 'dimmed'}">
                <div class="list-item-left" onclick="toggleCartItem(${item.originalIndex})">
                    <div class="checkbox">${item.checked ? '✓' : ''}</div>
                    <div><div class="item-name">${escapeHtml(item.name)}</div>${item.flag && !item.checked ? `<div class="item-flag">🕒 ${item.flag}</div>` : ''}</div>
                </div>
                <button class="trash-btn" onclick="executeSoftDelete('cart', '${item.originalIndex}')"><svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
              </div>`;
         });
      }
      document.getElementById('unified-cart-items').innerHTML = html;
    }

    function openMasterList() {
      const renderList = (arr) => arr.map(item => {
        const inCart = state.cart.some(c => c.name.toLowerCase().trim() === item.name.toLowerCase().trim());
        return `<div class="list-item-row ${inCart ? 'checked' : ''}"><div class="list-item-left" onclick="toggleMasterItem('${escapeHtml(item.name)}')"><div class="checkbox">${inCart ? '✓' : ''}</div><div><div class="item-name">${escapeHtml(item.name)}</div></div></div><button class="trash-btn" onclick="executeSoftDelete('master', '${escapeHtml(item.name)}')"><svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button></div>`;
      }).join('');
      document.getElementById('ml-content').innerHTML = renderList(state.masterGrocery.sort((a,b)=>a.name.localeCompare(b.name)));
      document.getElementById('masterListModal').classList.add('open');
    }

    function toggleCartItem(index) { 
        state.cart[index].checked = !state.cart[index].checked; 
        if(state.cart[index].checked) { state.cart[index].recent = false; state.cart[index].flag = ''; }
        renderCart(); saveStateLocally(); syncCartToBackend(); 
    }
    function clearActiveCart() { state.cart = state.cart.filter(c => !c.checked); renderCart(); saveStateLocally(); syncCartToBackend(); }
    function addManualCartItem() { const v = document.getElementById('manualCartAdd').value.trim(); if(v) { state.cart.unshift({name: v, checked: true, recent: false, mealContext: 'Uncategorized'}); document.getElementById('manualCartAdd').value = ''; renderCart(); saveStateLocally(); syncCartToBackend(); } }
    function toggleMasterItem(name) {
      const idx = state.cart.findIndex(c => c.name.toLowerCase().trim() === name.toLowerCase().trim());
      if(idx > -1) state.cart.splice(idx, 1);
      else state.cart.unshift({ name, checked: true, recent: false, flag: "", mealContext: 'Uncategorized' });
      openMasterList(); renderCart(); saveStateLocally(); syncCartToBackend();
    }
    function addManualMasterItem() { const v = document.getElementById('newMasterInput').value.trim(); if(v) { state.masterGrocery.push({name: v, freq: 1}); document.getElementById('newMasterInput').value = ''; openMasterList(); saveStateLocally(); fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'addMasterItem', item: v }) }); } }
    
    async function syncCartToBackend() { if(GOOGLE_SHEETS_API_URL.includes("script.google.com")) fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'syncCart', cart: state.cart }) }).catch(e=>e); }
    
    function openCookbook() { 
        updateCookbookStats();
        openModal('dataModal'); 
    }

    // MODIFIED: Added logic to completely hide the topbar on the cart tab
    function switchTab(tabId) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById(`page-${tabId}`).classList.add('active');
      
      const topbar = document.getElementById('mainTopbar');
      if (tabId === 'cart') {
          topbar.classList.add('topbar-hidden');
      } else {
          topbar.classList.remove('topbar-hidden');
      }
    }

    function toggleMainView() {
        if(activeTab === 'plan') {
            switchTab('cart');
            document.getElementById('navToggleBtn').innerHTML = '🍽️ Plan';
            activeTab = 'cart';
        } else {
            switchTab('plan');
            document.getElementById('navToggleBtn').innerHTML = '🛒 Cart';
            activeTab = 'plan';
        }
    }

    function updateCookbookStats() {
        document.getElementById('cb-mymeals').innerText = (state.db.breakfast||[]).length + (state.db.lunch||[]).length + (state.db.dinner||[]).length;
        document.getElementById('cb-global').innerText = state.aiDiscoveryPool.filter(m => ['breakfast', 'lunch', 'dinner'].includes(m.category.toLowerCase())).length;
        document.getElementById('cb-dessert').innerText = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === 'dessert').length + (state.db.dessert||[]).length;
        document.getElementById('cb-drinks').innerText = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === 'drinks').length + (state.db.drinks||[]).length;
        document.getElementById('cb-cocktails').innerText = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === 'cocktails').length + (state.db.cocktails||[]).length;
    }

    function renderCookbookList(cat) {
        let items = [];
        if (cat === 'MyMeals') {
            items = [...(state.db.breakfast||[]), ...(state.db.lunch||[]), ...(state.db.dinner||[])].map(m => ({name: m, src: 'Local DB'}));
        } else if (cat === 'Global') {
            items = state.aiDiscoveryPool.filter(m => ['breakfast', 'lunch', 'dinner'].includes(m.category.toLowerCase())).map(m => ({name: m.name, src: 'AI Pool'}));
        } else {
            const aiItems = state.aiDiscoveryPool.filter(m => m.category.toLowerCase() === cat.toLowerCase()).map(m => ({name: m.name, src: 'AI Pool'}));
            const dbItems = (state.db[cat.toLowerCase()]||[]).map(m => ({name: m, src: 'Local DB'}));
            items = [...aiItems, ...dbItems];
        }

        let html = '';
        if(!items.length) html = '<p class="subtle" style="text-align:center; padding: 20px;">No items found in this category.</p>';
        items.forEach(i => {
            html += `<div class="data-row"><span>${escapeHtml(i.name)}</span><span class="badge" style="font-size:0.65rem; background:transparent; border:1px solid var(--color-border); color:var(--color-text-muted);">${i.src}</span></div>`;
        });
        document.getElementById('cookbookOutput').innerHTML = html;
    }

    function forceRefill() {
        const btn = document.getElementById('refillBtn');
        btn.innerHTML = `Syncing Database...`;
        document.getElementById('syncIndicator').classList.add('active');
        
        fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'forceRefill' }) })
        .then(res => res.json())
        .then(parsed => {
            const data = parsed.data;
            Object.assign(state.db, { breakfast: data.breakfast, lunch: data.lunch, dinner: data.dinner, dessert: data.dessert, drinks: data.drinks, cocktails: data.cocktails });
            if(data.aiDiscoveryPool) state.aiDiscoveryPool = data.aiDiscoveryPool;
            saveStateLocally();
            updateCookbookStats(); 
            btn.innerHTML = `⚡ Refill`;
            document.getElementById('syncIndicator').classList.remove('active');
        }).catch(e => {
            btn.innerHTML = `⚡ Refill`;
            document.getElementById('syncIndicator').classList.remove('active');
        });
    }

    function queueUnifiedEntry() {
        const m = document.getElementById('unified-meal-input').value.trim();
        const c = document.getElementById('unified-meal-category').value;
        if (m) { pendingApprovals.push({ category: c, meal: m }); document.getElementById('unified-meal-input').value = ''; renderReviewQueue(); }
    }
    
    function renderReviewQueue() {
      const ql = document.getElementById('reviewQueueList'); ql.innerHTML = '';
      const qp = document.getElementById('reviewQueuePanel');
      if (!pendingApprovals.length) { qp.style.display = 'none'; return; }
      qp.style.display = 'block';
      pendingApprovals.forEach((item, idx) => {
        const li = document.createElement('li'); li.className = 'review-queue-item';
        
        const catSelect = `
        <select onchange="pendingApprovals[${idx}].category = this.value">
            <option value="Breakfast" ${item.category.toLowerCase()==='breakfast'?'selected':''}>Breakfast</option>
            <option value="Lunch" ${item.category.toLowerCase()==='lunch'?'selected':''}>Lunch</option>
            <option value="Dinner" ${item.category.toLowerCase()==='dinner'?'selected':''}>Dinner</option>
            <option value="Dessert" ${item.category.toLowerCase()==='dessert'?'selected':''}>Dessert</option>
            <option value="Drinks" ${item.category.toLowerCase()==='drinks'?'selected':''}>Drinks</option>
            <option value="Cocktails" ${item.category.toLowerCase()==='cocktails'?'selected':''}>Cocktails</option>
        </select>`;

        li.innerHTML = `
        <div style="display:flex; align-items:center; gap:0.75rem; flex-grow:1;">
            <span style="font-weight:600; font-family:var(--font-display);">${escapeHtml(item.meal)}</span> 
            ${catSelect}
        </div>
        <button class="trash-btn" data-remove-queue="${idx}"><svg style="pointer-events:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>`;
        ql.appendChild(li);
      });
    }
    
    document.addEventListener('click', e => { const rmBtn = e.target.closest('[data-remove-queue]'); if (rmBtn) { pendingApprovals.splice(Number(rmBtn.dataset.removeQueue), 1); renderReviewQueue(); } });
    
    async function submitQueueForApproval() {
      if (!pendingApprovals.length) return;
      const btn = document.getElementById('submitApprovalBtn'); btn.innerHTML = `Syncing...`;
      try {
        const res = await fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'sync_meals', data: JSON.stringify(pendingApprovals) }) });
        if ((await res.json()).success) {
            pendingApprovals.forEach(i => { 
                const catLower = i.category.toLowerCase();
                if(state.db[catLower]) state.db[catLower].push(i.meal); 
            });
            pendingApprovals = []; renderReviewQueue(); updateCookbookStats(); saveStateLocally();
            
            document.getElementById('openDataBtn').innerHTML = `<svg style="pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`;
            
            btn.innerHTML = "✓ Synced"; setTimeout(() => btn.innerHTML = "Push to Cloud", 2000);
        } else throw new Error();
      } catch (err) { btn.innerHTML = "Push to Cloud"; }
    }

    let shoppingQueue = []; let shoppingIndex = 0; let activePlatform = 'swiggy';
    function startGuidedShopping(platform) {
      shoppingQueue = state.cart.filter(i => i.checked); 
      if(!shoppingQueue.length) { 
          alert("Please check at least one item to shop."); return; 
      }
      activePlatform = platform; shoppingIndex = 0; updateGuidedUI(); 
      document.getElementById('guided-overlay').classList.add('active'); launchPlatformLink();
    }
    function updateGuidedUI() {
      document.getElementById('shopping-progress').innerText = `Item ${shoppingIndex + 1} of ${shoppingQueue.length} (${activePlatform.toUpperCase()})`;
      document.getElementById('shopping-item-name').innerText = escapeHtml(shoppingQueue[shoppingIndex].name);
    }
    function launchPlatformLink() {
        const query = encodeURIComponent(shoppingQueue[shoppingIndex].name);
        window.location.href = activePlatform === 'swiggy' ? `swiggy://instamart/search?query=${query}` : `https://blinkit.com/s/?q=${query}`;
    }
    function markFoundAndNext() {
      const current = shoppingQueue[shoppingIndex];
      const dbIdx = state.cart.findIndex(c => c.name.toLowerCase().trim() === current.name.toLowerCase().trim() && c.mealContext === current.mealContext);
      if(dbIdx > -1) { state.cart[dbIdx].checked = false; state.cart[dbIdx].recent = true; state.cart[dbIdx].flag = "Verified Purchase"; }
      fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateHistory', items: [current.name] }) }).catch(e=>e);
      shoppingIndex++;
      if(shoppingIndex >= shoppingQueue.length) { closeGuidedShopping(); saveStateLocally(); syncCartToBackend(); }
      else { updateGuidedUI(); launchPlatformLink(); }
    }
    function markNotFoundAndNext() {
      shoppingIndex++;
      if(shoppingIndex >= shoppingQueue.length) { closeGuidedShopping(); saveStateLocally(); syncCartToBackend(); }
      else { updateGuidedUI(); launchPlatformLink(); }
    }
    function closeGuidedShopping() { document.getElementById('guided-overlay').classList.remove('active'); renderCart(); }

    function saveStateLocally() { localStorage.setItem('mp_data', JSON.stringify(state)); }

    function init() {
      const cached = localStorage.getItem('mp_data');
      if (cached) {
          state = JSON.parse(cached);
          state.cart.forEach(c => { if(!c.mealContext) c.mealContext = "Uncategorized"; });
          renderEmptyState();
      } else {
          document.getElementById('syncIndicator').classList.add('active');
          renderEmptyState();
      }
      updateUndoButton();
      
      if (!GOOGLE_SHEETS_API_URL || GOOGLE_SHEETS_API_URL.includes("PASTE")) return;
      
      fetch(GOOGLE_SHEETS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllData' }) })
        .then(res => res.json())
        .then(parsed => {
            const data = parsed.data;
            Object.assign(state.db, { breakfast: data.breakfast, lunch: data.lunch, dinner: data.dinner, dessert: data.dessert, drinks: data.drinks, cocktails: data.cocktails });
            state.masterGrocery = data.masterGrocery; state.orderHistory = data.orderHistory; state.cart = data.cart; state.cookingHistory = data.cookingHistory;
            
            if(data.aiDiscoveryPool && data.aiDiscoveryPool.length > state.aiDiscoveryPool.length) state.aiDiscoveryPool = data.aiDiscoveryPool;
            saveStateLocally();
            document.getElementById('syncIndicator').classList.remove('active');
            
        }).catch(e => { document.getElementById('syncIndicator').classList.remove('active'); });
    }

    init();
  </script>
</body>
</html>
